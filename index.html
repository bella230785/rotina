function switchView(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab,.sb-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+id)?.classList.add('active');
  btn?.classList.add('active');
  const tabEl=document.getElementById('tab-'+id);
  if(tabEl&&tabEl!==btn) tabEl.classList.add('active');
  const isCal=id==='cal';
  document.getElementById('subbar').style.display=isCal?'flex':'none';
  document.getElementById('legbar').style.display=isCal?'flex':'none';
  // Reset category filter when switching tabs
  currentFilterCat=null;
  // Update currentSidebarKey based on view
  const viewKeyMap={cal:'semana',nexus:'nexus',rotina:'rotina'};
  if(viewKeyMap[id]) currentSidebarKey=viewKeyMap[id];
  if(id==='prog') renderProg();
  if(id==='nexus'){ renderNexus(); renderTaskPanelForKey('nexus'); }
  if(id==='historia') renderChecklist('historia','cl-wrap-historia');
  if(id==='sociedade') renderChecklist('sociedade','cl-wrap-sociedade');
  if(id==='noticias') renderChecklist('noticias','cl-wrap-noticias');
  if(id==='rotina'){ renderChecklist('rotina','cl-wrap-rotina'); renderTaskPanelForKey('rotina'); }
  if(id==='cal'){ renderTaskPanelForKey('semana'); }
  if(id==='study'){
    // Show study kanban view in main area + load study tasks in panel
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-study').classList.add('active');
    document.getElementById('subbar').style.display='none';
    document.getElementById('legbar').style.display='none';
    renderStudy();
    currentSidebarKey='study';
    document.getElementById('sb-study')?.classList.add('active');
    renderTaskPanelForKey('study');
    return;
  }
}

// ── RESIZE DE COLUNAS DO CALENDÁRIO ──
const colWidths={};// di -> width em px (null = auto)
function initColResize(){
  const body=document.getElementById('cal-body');
  if(!body) return;
  body.querySelectorAll('.day-col').forEach((col,di)=>{
    // Remover handle antigo se existir
    col.querySelector('.col-resize-handle')?.remove();
    const handle=document.createElement('div');
    handle.className='col-resize-handle';
    handle.title='Arrastar para redimensionar coluna';
    col.appendChild(handle);
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();
      e.stopPropagation();
      handle.classList.add('active');
      const startX=e.clientX;
      const startW=col.offsetWidth;
      function onMove(ev){
        const newW=Math.max(40, startW+(ev.clientX-startX));
        col.style.width=newW+'px';
        col.style.flex='none';
        colWidths[di]=newW;
      }
      function onUp(){
        handle.classList.remove('active');
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
      }
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
    // Aplicar width salvo
    if(colWidths[di]){col.style.width=colWidths[di]+'px';col.style.flex='none';}
  });
}

function quickAddTask(val, inputEl){
  const label=val?.trim()||'';
  if(!label) return;
  if(inputEl) inputEl.value='';
  // Determine target category for the new task
  const _qmap_default=SIDEBAR_MAP[currentSidebarKey];
  const _defaultTabId=_qmap_default?.tabId;
  // If in a tab (nexus/rotina/study), use that tab's sem_cat card
  const _defaultCardId=_defaultTabId
    ?(CARD_DEFS_BY_TAB[_defaultTabId]||[]).find(c=>c.id===DEFAULT_CARD_IDS[_defaultTabId])?.id
     ||(CARD_DEFS_BY_TAB[_defaultTabId]||[])[0]?.id
    :null;
  const catId=activePanelCatId||currentFilterCat||_defaultCardId||'outros';
  const task={id:'u'+Date.now(),label,catId,done:false,priority:3,due:'',note:'',alarm:'',time:'',duration:''};
  // Add to TASK_DATA
  TASK_DATA[currentTaskTab].unshift(task);
  // Add to CARD_DEFS_BY_TAB in the "sem categoria" card of the current tab
  const _qmap3=SIDEBAR_MAP[currentSidebarKey];
  const _tabId=_qmap3?.tabId;
  // Only sync to CARD_DEFS if we're in a tab view; semana tasks stay in TASK_DATA only
  if(_tabId){
    const _defs=CARD_DEFS_BY_TAB[_tabId]||[];
    const _card=_defs.find(c=>c.id===catId)||_defs.find(c=>c.id===DEFAULT_CARD_IDS[_tabId])||_defs[0];
    if(_card) _card.tasks.unshift({id:task.id,l:label,n:'',due:'',alarm:'',time:'',duration:''});
  } else if(currentSidebarKey==='study'){
    const _destCard=(CARD_DEFS_BY_TAB['historia']||[]).find(c=>c.id==='hist_sem_cat')||
                    (CARD_DEFS_BY_TAB['historia']||[])[0];
    if(_destCard) _destCard.tasks.unshift({id:task.id,l:label,n:'',due:'',alarm:'',time:'',duration:''});
  }
  // Re-render kanban if visible
  const _qmap=SIDEBAR_MAP[currentSidebarKey];
  if(_qmap?.tabId==='nexus') renderNexus();
  else if(_qmap?.tabId) renderChecklist(_qmap.tabId,'cl-wrap-'+_qmap.tabId);
  else if(currentSidebarKey==='study') renderStudy();
  // Always re-render task panel (clear filter to show new task)
  if(currentFilterCat) filterTasksBy(currentFilterCat);
  else renderTaskPanelForKey(currentSidebarKey);
  saveState();
}

function renderTaskPanelByCats(allTasks, title, addCatId){
  const list=document.getElementById('task-list');
  if(!list) return;
  setTaskPanelTitle(title);
  const catName=addCatId?getCat(addCatId)?.name:'';
  updateAddInputPlaceholder(catName);

  // Agrupar por categoria
  const catMap={};
  allTasks.forEach(t=>{
    const cid=t.catId||t.id;
    if(!catMap[cid]) catMap[cid]=[];
    catMap[cid].push(t);
  });

  function sortTasks(arr){
    return [...arr].sort((a,b)=>{
      const pa=a.priority||4,pb=b.priority||4;
      if(pa!==pb) return pa-pb;
      if(a.due&&b.due) return new Date(a.due)-new Date(b.due);
      if(a.due) return -1; if(b.due) return 1;
      return 0;
    });
  }

  let html='';
  // Pendentes agrupadas por categoria
  const pendingByCat={};
  const scheduledByCat={};
  const doneByCat={};
  allTasks.forEach(t=>{
    const cid=t.catId||'_';
    const isDone=taskDoneState[t.id]||t.done;
    const isSched=scheduledTasks.has(t.id)&&!isDone;
    if(isDone){if(!doneByCat[cid])doneByCat[cid]=[];doneByCat[cid].push(t);}
    else if(isSched){if(!scheduledByCat[cid])scheduledByCat[cid]=[];scheduledByCat[cid].push(t);}
    else{if(!pendingByCat[cid])pendingByCat[cid]=[];pendingByCat[cid].push(t);}
  });

  // Aplicar filtro de view (today/overdue)
  function filterView(arr){
    return arr.filter(t=>passesFilter(t));
  }

  const allCatIds=[...new Set(allTasks.map(t=>t.catId||'_'))];
  allCatIds.forEach(cid=>{
    const cat=CATEGORIES.find(c=>c.id===cid)||(()=>{
      const card=Object.values(CARD_DEFS_BY_TAB).flat().find(c=>c.id===cid);
      return card?{name:card.title,icon:card.icon||'',bg:card.iconBg||'#eee',color:card.color||'#666'}:null;
    })()||{name:cid,icon:'',bg:'#eee',color:'#666'};
    const pending=filterView(sortTasks(pendingByCat[cid]||[]));
    const sched=scheduledByCat[cid]||[];
    const done=doneByCat[cid]||[];
    if(!pending.length&&!sched.length&&!done.length) return;

    html+=`<div class="tp-cat-group">
      <div class="tp-cat-group-hdr" onclick="filterTasksBy('${cid}')" style="cursor:pointer;" title="Filtrar por categoria">
        <span class="tp-cat-group-dot" style="background:${cat.bg}"></span>
        <span class="tp-cat-group-name" style="text-transform:lowercase">${cat.name}</span>
        <span class="tp-cat-group-count">${pending.length+sched.length}</span>
      </div>
      ${pending.map(t=>taskItemHTML(t)).join('')}
      ${sched.map(t=>taskItemHTML(t,false,true)).join('')}
    </div>`;
    if(done.length){
      html+=`<div class="tp-cat-done-toggle" onclick="toggleCatDone('${cid}',this)">
        <span>Concluídas</span><span class="tp-cat-done-count">${done.length}</span><span class="tp-cat-done-arrow">▸</span>
      </div>
      <div class="tp-cat-done-list" id="tpd-${cid}" style="display:none">
        ${done.map(t=>taskItemHTML(t,true)).join('')}
      </div>`;
    }
  });

  if(!html) html=`<div style="padding:20px 16px;font-size:12px;color:var(--g300);text-align:center">Nenhuma tarefa</div>`;
  html+=`<div style="padding:8px 0 4px"></div>`;
  list.innerHTML=html;

  bindTaskDrag(list);
}

  nexus:  {mode:'checklist', tabId:'nexus',     label:'Nexus.doc', icon:'🎬', bg:'#d3a6bd', color:'#fff'},

function bindTaskDrag(list){
  list.querySelectorAll('.task-item[data-taskid]').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      const id=el.dataset.taskid;
      const allT=[...TASK_DATA.semana,...TASK_DATA.mes,...TASK_DATA.nexus];
      // Look in TASK_DATA first, then CARD_DEFS_BY_TAB
      let _dt=allT.find(t=>t.id===id);
      // Also look in CARD_DEFS_BY_TAB to get duration/time fields
      for(const defs of Object.values(CARD_DEFS_BY_TAB)){
        for(const card of defs){
          const ct=card.tasks?.find(x=>x.id===id);
          if(ct){
            if(_dt){
              // Merge extra fields from card task
              _dt={..._dt,duration:_dt.duration||ct.duration||'',time:_dt.time||ct.time||''};
            } else {
              _dt={id,label:ct.l||ct.label||el.dataset.label,catId:card.id,
                   duration:ct.duration||'',time:ct.time||'',
                   _bg:card.iconBg,_color:card.color};
            }
            break;
          }
        }
      }
      draggingTask=_dt||{id,label:el.dataset.label,catId:el.dataset.catid,duration:'',
                         _bg:el.dataset.bg,_color:el.dataset.color};
      el.classList.add('dragging-task');
      e.dataTransfer.effectAllowed='copy';
      e.dataTransfer.setData('text/plain',id);
    });
    el.addEventListener('dragend',()=>{el.classList.remove('dragging-task');draggingTask=null;removeGhost();});
  });
}

function renderTaskPanelForKey(key, filterCatId=null){
  currentSidebarKey=key;
  const map=SIDEBAR_MAP[key];
  let allTasks=[];
  let title='tasks';
  let addCatId=null;

  if(map&&map.mode==='study'){
    title='study';
    ['historia','sociedade','noticias'].forEach(tabId=>{
      const defs=CARD_DEFS_BY_TAB[tabId]||[];
      defs.forEach(card=>{
        card.tasks.forEach(t=>{
          allTasks.push({
            id:t.id, label:t.l||'', note:t.n||'',
            catId:card.id, due:t.due||'', alarm:t.alarm||'',
            time:t.time||'', duration:t.duration||'',
            priority:t.priority||4, subtasks:t.subtasks||[],
            _bg:card.iconBg, _color:card.color,
          });
        });
      });
    });
    // Default add target: first card of historia (hist_outros)
    addCatId='hist_outros';
    allTasks=allTasks.map(t=>{
      const card=Object.values(CARD_DEFS_BY_TAB).flat().find(c=>c.id===t.catId);
      return{...t, bg:t._bg||(card?.iconBg||'#eee'), color:t._color||(card?.color||'#666')};
    });
    renderTaskPanelByCats(allTasks,'study',addCatId);
    return;
  }
  if(!map||map.mode==='task_tab'){
    title='tasks';
    // Collect from TASK_DATA (manually added tasks)
    allTasks=[...TASK_DATA.semana,...TASK_DATA.mes].map(t=>({
      id:t.id, label:t.label, note:t.note||'',
      catId:t.catId, due:t.due, alarm:t.alarm, priority:t.priority,
      subtasks:t.subtasks,
    }));
    // Also collect from ALL CARD_DEFS_BY_TAB (kanban tasks)
    Object.entries(CARD_DEFS_BY_TAB).forEach(([tabId,defs])=>{
      defs.forEach(card=>{
        card.tasks.forEach(t=>{
          allTasks.push({
            id:t.id, label:t.l||'', note:t.n||'',
            catId:card.id, due:t.due||'', alarm:t.alarm||'',
            time:t.time||'', duration:t.duration||'',
            priority:t.priority||4, subtasks:t.subtasks||[],
            _bg:card.iconBg, _color:card.color
          });
        });
      });
    });
    // Deduplicate
    const seen=new Set();
    allTasks=allTasks.filter(t=>{if(seen.has(t.id))return false;seen.add(t.id);return true;});
    addCatId=null;
  } else if(map.mode==='checklist'){
    title=map.label.toLowerCase();
    addCatId=null;
    const defs=CARD_DEFS_BY_TAB[map.tabId]||[];
    defs.forEach(card=>{
      card.tasks.forEach(t=>{
        allTasks.push({
          id:t.id, label:t.l, note:t.n||'',
          catId:card.id, due:t.due||'', alarm:t.alarm||'', priority:t.priority||4,
          time:t.time||'', duration:t.duration||'',
          subtasks:t.subtasks,
          _bg:card.iconBg, _color:card.color,
        });
      });
    });
    addCatId=defs[0]?.id;
  }

  // Filtro de categoria individual (clique em categoria)
  if(filterCatId){
    const cat=getCat(filterCatId)||CATEGORIES.find(c=>c.id===filterCatId);
    allTasks=allTasks.filter(t=>t.catId===filterCatId);
    title=(cat?.icon||'')+(cat?.name||filterCatId);
    addCatId=filterCatId;
    activePanelCatId=filterCatId;
  } else {
    activePanelCatId=null;
  }

  // Enriquecer com bg/color das categorias
  allTasks=allTasks.map(t=>{
    const cat=CATEGORIES.find(c=>c.id===t.catId)||
      Object.values(CARD_DEFS_BY_TAB).flat().find(c=>c.id===t.catId);
    return{...t,
      bg:t._bg||(cat?.iconBg||cat?.bg||'#eee'),
      color:t._color||(cat?.color||'#666')
    };
  });

  renderTaskPanelByCats(allTasks, title, addCatId);
}

// ── HORAS: designadas vs cumpridas ──
function updateHoursWidget(){
  const barsEl=document.getElementById('sb-hours-bars');
  if(!barsEl) return;

  // Horas cumpridas: calcular dos blocos no calendário (slots * 0.5h)
  const cumpridas={};
  for(let d=0;d<7;d++){
    const seen=new Set();
    Object.entries(calState[d]).forEach(([si,bd])=>{
      if(!bd||bd.type==='work') return;
      const key=bd.label;
      if(seen.has(key)) return;
      seen.add(key);
      const len=getBlockLen(d,parseInt(si));
      cumpridas[key]=(cumpridas[key]||0)+len*0.5;
    });
    Object.entries(overlays).forEach(([ok,ovList])=>{
      const[od]=ok.split('-').map(Number);
      if(od!==d) return;
      ovList.forEach(ov=>{cumpridas[ov.label]=(cumpridas[ov.label]||0)+(ov.span||2)*0.5;});
    });
  }

  // Horas designadas: somar o campo h das tarefas não concluídas em CARD_DEFS_BY_TAB
  const designadas={};
  Object.values(CARD_DEFS_BY_TAB).forEach(defs=>{
    defs.forEach(card=>{
      card.tasks.forEach(t=>{
        if(!t.h) return;
        const key=card.title;
        designadas[key]=(designadas[key]||0)+t.h;
      });
    });
  });

  // Unir todas as chaves
  const allKeys=new Set([...Object.keys(cumpridas),...Object.keys(designadas)]);
  if(!allKeys.size){
    barsEl.innerHTML=`<div style="font-size:10px;color:var(--g300);text-align:center;padding:4px 0">Nenhum bloco esta semana</div>`;
    return;
  }

  // Cor por label
  function labelColor(label){
    // Tentar mapear para categoria no CARD_DEFS
    for(const defs of Object.values(CARD_DEFS_BY_TAB)){
      const card=defs.find(c=>c.title===label||label.includes(c.title)||c.title.includes(label));
      if(card) return card.iconBg;
    }
    const cat=CATEGORIES.find(c=>c.name===label||label.includes(c.name));
    return cat?cat.bg:'#d9ead3';
  }

  const entries=[...allKeys].map(k=>({
    label:k,
    desig:designadas[k]||0,
    cum:cumpridas[k]||0
  })).sort((a,b)=>(b.desig+b.cum)-(a.desig+a.cum)).slice(0,8);

  const maxVal=Math.max(...entries.map(e=>Math.max(e.desig,e.cum)),1);

  barsEl.innerHTML=`
    <div style="display:flex;gap:10px;margin-bottom:6px;font-size:9px;color:var(--g400)">
      <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:var(--g200);display:inline-block"></span>designadas</span>
      <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#cf6d9e;display:inline-block"></span>cumpridas</span>
    </div>
    ${entries.map(e=>`
    <div style="margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--g700);margin-bottom:3px">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px">${e.label}</span>
        <span style="color:var(--g400);flex-shrink:0;margin-left:4px">${e.cum}h / ${e.desig}h</span>
      </div>
      <div style="position:relative;height:6px;background:var(--g150);border-radius:99px;overflow:hidden">
        <div style="position:absolute;left:0;top:0;height:100%;width:${Math.round(e.desig/maxVal*100)}%;background:${labelColor(e.label)};opacity:.4;border-radius:99px"></div>
        <div style="position:absolute;left:0;top:0;height:100%;width:${Math.round(e.cum/maxVal*100)}%;background:#cf6d9e;border-radius:99px;transition:width .4s"></div>
      </div>
    </div>
  `).join('')}
  `;
}

const CAT_TAB_MAP={
  nexus:['nexus'],
  study:['historia','sociedade','noticias'],

};

function filterTasksBy(catId){
  let allTasks=[];
  // Determine which tabs this category covers
  const tabs=CAT_TAB_MAP[catId]||[];
  const cat=CATEGORIES.find(c=>c.id===catId);

  if(tabs.length>0){
    // Top-level category: collect ALL tasks from its tabs' cards
    tabs.forEach(tabId=>{
      const defs=CARD_DEFS_BY_TAB[tabId]||[];
      defs.forEach(card=>{
        card.tasks.forEach(t=>allTasks.push({
          id:t.id,label:t.l||'',note:t.n||'',
          catId:card.id,  // keep card id for grouping by subcategory
          due:t.due||'',alarm:t.alarm||'',time:t.time||'',duration:t.duration||'',
          priority:t.priority||4,subtasks:t.subtasks||[],
          _bg:card.iconBg,_color:card.color
        }));
      });
    });
    // Also from TASK_DATA where catId matches any card in these tabs
    const tabCardIds=new Set(tabs.flatMap(tid=>(CARD_DEFS_BY_TAB[tid]||[]).map(c=>c.id)));
    tabCardIds.add(catId); // include top-level catId too
    const seenFromData=new Set(allTasks.map(t=>t.id));
    [...TASK_DATA.semana,...TASK_DATA.mes].forEach(t=>{
      if(seenFromData.has(t.id)) return; // already collected from CARD_DEFS
      if(tabCardIds.has(t.catId)||t.catId===catId) allTasks.push({
        id:t.id,label:t.label,note:t.note||'',catId:t.catId,
        due:t.due||'',alarm:t.alarm||'',time:t.time||'',duration:t.duration||'',
        priority:t.priority||4,subtasks:t.subtasks||[]});
    });
  } else {
    // User-created or unknown category: search everywhere
    Object.values(CARD_DEFS_BY_TAB).flat().forEach(card=>{
      if(card.id!==catId) return;
      card.tasks.forEach(t=>allTasks.push({
        id:t.id,label:t.l||'',note:stripHTML(t.n||''),catId:card.id,
        due:t.due||'',alarm:t.alarm||'',time:t.time||'',duration:t.duration||'',
        priority:t.priority||4,subtasks:t.subtasks||[],
        _bg:card.iconBg,_color:card.color
      }));
    });
    [...TASK_DATA.semana,...TASK_DATA.mes].forEach(t=>{
      if(t.catId===catId) allTasks.push({
        id:t.id,label:t.label,note:t.note||'',catId:t.catId,
        due:t.due||'',alarm:t.alarm||'',time:t.time||'',duration:t.duration||'',
        priority:t.priority||4,subtasks:t.subtasks||[]});
    });
  }

  // Deduplicate
  const seen=new Set();
  allTasks=allTasks.filter(t=>{if(seen.has(t.id))return false;seen.add(t.id);return true;});

  // Enrich with colors
  const enriched=allTasks.map(t=>{
    const c=CATEGORIES.find(x=>x.id===t.catId)||Object.values(CARD_DEFS_BY_TAB).flat().find(x=>x.id===t.catId);
    return{...t,bg:t._bg||(c?.iconBg||c?.bg||'#eee'),color:t._color||(c?.color||'#666')};
  });

  activePanelCatId=catId;
  renderTaskPanelByCats(enriched, cat?.name||catId, null);
}

function dueDateClass(due){
  if(!due) return '';
  const now=new Date(); now.setHours(0,0,0,0);
  const [dy,dm,dd2]=due.split('-').map(Number);
  const d=new Date(dy,dm-1,dd2);
  const diff=Math.round((d-now)/(1000*60*60*24));
  if(diff<0) return 'overdue';
  if(diff===0) return 'today';
  if(diff<=2) return 'soon';
  return '';
}

function dueDateLabel(due){
  if(!due) return '';
  const now=new Date(); now.setHours(0,0,0,0);
  const [dy2,dm2,dd3]=due.split('-').map(Number);
  const d=new Date(dy2,dm2-1,dd3);
  const diff=Math.round((d-now)/(1000*60*60*24));
  if(diff<0) return `venceu há ${Math.abs(diff)}d`;
  if(diff===0) return 'hoje';
  if(diff===1) return 'amanhã';
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}

let _ducYear=new Date().getFullYear();
let _ducMonth=new Date().getMonth();
let _ducSelected=null; // 'YYYY-MM-DD' ou null

const MONTHS_PT=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_PT=['S','T','Q','Q','S','S','D'];

function duCalShift(dir){
  _ducMonth+=dir;
  if(_ducMonth>11){_ducMonth=0;_ducYear++;}
  if(_ducMonth<0){_ducMonth=11;_ducYear--;}
  renderDueCal();
}

function renderDueCal(){
  const lbl=document.getElementById('duc-month-label');
  if(lbl) lbl.textContent=MONTHS_PT[_ducMonth]+' '+_ducYear;

  const namesEl=document.getElementById('duc-daynames');
  if(namesEl) namesEl.innerHTML=DAYS_PT.map(d=>`<div class="due-cal-day-name">${d}</div>`).join('');

  const daysEl=document.getElementById('duc-days');
  if(!daysEl) return;

  const today=new Date(); today.setHours(0,0,0,0);
  const first=new Date(_ducYear,_ducMonth,1);
  // Semana começa na segunda (1). getDay() retorna 0=dom
  let startOffset=(first.getDay()+6)%7; // 0=seg
  const daysInMonth=new Date(_ducYear,_ducMonth+1,0).getDate();
  const daysInPrev=new Date(_ducYear,_ducMonth,0).getDate();

  let html='';
  // Dias do mês anterior
  for(let i=startOffset-1;i>=0;i--){
    html+=`<button class="due-cal-day other-month" onclick="selectDueDay(${_ducYear},${_ducMonth-1>=0?_ducMonth-1:11},${daysInPrev-i})">${daysInPrev-i}</button>`;
  }
  // Dias do mês atual
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(_ducYear,_ducMonth,d);
    const iso=`${_ducYear}-${String(_ducMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isTod=dt.getTime()===today.getTime();
    const isSel=_ducSelected===iso;
    const isPast=dt<today&&!isTod;
    let cls='due-cal-day';
    if(isTod) cls+=' today';
    if(isSel) cls+=' selected';
    if(isPast) cls+=' past';
    html+=`<button class="${cls}" onclick="selectDueDay(${_ducYear},${_ducMonth},${d})">${d}</button>`;
  }
  // Completar grade
  const total=startOffset+daysInMonth;
  const remaining=(7-total%7)%7;
  for(let d=1;d<=remaining;d++){
    html+=`<button class="due-cal-day other-month">${d}</button>`;
  }
  daysEl.innerHTML=html;
}

function setDueShortcut(type){
  const now=new Date(); now.setHours(0,0,0,0);
  let target=new Date(now);
  if(type==='today') { /* já é hoje */ }
  else if(type==='tomorrow') target.setDate(now.getDate()+1);
  else if(type==='week') target.setDate(now.getDate()+7);
  else if(type==='night') { target=new Date(now); }
  const iso=target.toISOString().slice(0,10);
  _ducSelected=iso;
  _ducYear=target.getFullYear();

}

function getAllTask(id){
  // Buscar em TASK_DATA
  const all=[...TASK_DATA.semana,...TASK_DATA.mes,...TASK_DATA.nexus];
  const fromData=all.find(t=>t.id===id);
  if(fromData) return fromData;
  // Buscar em CARD_DEFS_BY_TAB (tarefas das abas)
  for(const defs of Object.values(CARD_DEFS_BY_TAB)){
    for(const card of defs){
      const t=card.tasks?.find(x=>x.id===id);
      if(t){
        // Return a live proxy object that reads/writes to card task
        // for scheduling fields (time, duration, recurrence, due)
        const proxy={
          id:t.id, label:t.l||t.label||'', note:t.n||t.note||'',
          catId:card.id, due:t.due||'', alarm:t.alarm||'',
          time:t.time||'', duration:t.duration||'', recurrence:t.recurrence||'',
          priority:t.priority||4, subtasks:t.subtasks||[],
          _cardId:card.id, _inCardDefs:true, _cardTask:t
        };
        return proxy;
      }
    }
  }
  return null;
}

function plainToRich(text){
  if(!text) return '';
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .split(/[\n]{2,}/).map(p=>'<p>'+p.replace(/[\n]/g,'<br>')+'</p>').join('');
}
function cleanPastedHTML(h){
  // Strip dangerous tags, keep structure
  const tmp=document.createElement('div');
  tmp.innerHTML=h;
  tmp.querySelectorAll('script,style,meta,link').forEach(el=>el.remove());
  // Remove MS Word / Google Docs cruft classes/styles but keep tags
  tmp.querySelectorAll('[class],[style]').forEach(el=>{
    el.removeAttribute('class');
    // Keep only font-weight and font-style
    const fw=el.style.fontWeight;const fs=el.style.fontStyle;const td=el.style.textDecoration;
    el.removeAttribute('style');
    if(fw==='bold'||fw>='600') el.style.fontWeight='bold';
    if(fs==='italic') el.style.fontStyle='italic';
    if(td&&td.includes('underline')) el.style.textDecoration='underline';
  });
  return tmp.innerHTML;
}

let _tdDragBound=false;
function initDetailPanelDrag(panel){
  if(_tdDragBound) return;
  _tdDragBound=true;
  const handle=document.getElementById('td-drag-handle');
  if(!handle) return;
  let startX,startY,startL,startT;
  handle.addEventListener('mousedown',e=>{
    if(e.target.closest('.task-cb,.task-detail-close,.task-detail-cat,select,button,input')) return;
    e.preventDefault();
    startX=e.clientX;startY=e.clientY;
    const r=panel.getBoundingClientRect();
    startL=r.left;startT=r.top;
    panel.classList.add('dragging');
    function onMove(ev){
      panel.style.left=(startL+(ev.clientX-startX))+'px';
      panel.style.top=(startT+(ev.clientY-startY))+'px';
      panel.style.transform='none';
    }
    function onUp(){
      panel.classList.remove('dragging');
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

function saveDetailField(field, value){
  if(!currentDetailId) return;
  const t=getAllTask(currentDetailId);
  // Pending slot from + button in calendar
  if(t&&t._pendingSlot&&(field==='duration'||field==='label')&&t.label){
    const {di,si}=t._pendingSlot;
    const cat=getCat(t.catId);
    const dur=field==='duration'?value:(t.duration||'01:00');
    const slots=parseDurationToSlots(dur||'01:00');
    const lbl=(field==='label'?value:t.label);
    if(lbl){
      for(let k=0;k<12;k++) if(calState[di]?.[si+k]?.taskId===t.id) calState[di][si+k]=null;
      for(let k=0;k<slots&&si+k<TOTAL_SLOTS;k++)
        calState[di][si+k]={bg:cat.bg,color:cat.color,label:lbl.length>26?lbl.slice(0,24)+'…':lbl,sub:cat.name||'',taskId:t.id};
      if(field==='duration') delete t._pendingSlot;
      setTimeout(()=>renderCal(),50);
    }
  }
  // Save field to t immediately so slot placement has correct values
  if(t) t[field]=value;
  // If task is from CARD_DEFS, also save scheduling fields directly to card task
  if(t?._cardTask){
    const ct=t._cardTask;
    ct[field]=value; // save directly to card task object
  }
  // Also save to TASK_DATA immediately for scheduling lookup
  ['semana','mes','nexus'].forEach(tab=>{
    const td=TASK_DATA[tab].find(x=>x.id===currentDetailId);
    if(td) td[field]=value;
  });
  // Place/update slot when scheduling fields change
  if((field==='due'||field==='time'||field==='duration'||field==='recurrence')&&t&&t.label){
    // Merge current field value with stored values (TASK_DATA not yet updated)
    const due=field==='due'?value:(t.due||'');
    const time=field==='time'?value:(t.time||'');
    const dur=field==='duration'?value:(t.duration||'01:00');
    const recVal=field==='recurrence'?value:(t.recurrence||'');
    if(due&&time){
      const weekDates=getWeekDates();
      const [dy,dm,dd]=due.split('-').map(Number);
      const dueDate=new Date(dy,dm-1,dd);
      const di=weekDates.findIndex(d=>d.toDateString()===dueDate.toDateString());
      if(di>=0){
        const [hh,mm]=time.split(':').map(Number);
        const si=Math.max(0,(hh-6)*2+(mm>=30?1:0));
        const cat=getCat(t.catId);
        const slots=parseDurationToSlots(dur);
        const label=t.label.length>26?t.label.slice(0,24)+'…':t.label;
        clearTaskSlots(t.id);
        for(let k=0;k<slots&&si+k<TOTAL_SLOTS;k++)
          calState[di][si+k]={bg:cat.bg,color:cat.color,label,sub:cat.name||'',taskId:t.id};
        // Apply recurrence: place same slot on recurring days within the week
        const rec=recVal;
        if(rec){
          const weekDates=getWeekDates();
          const recDays=[];
          if(rec==='daily'){ for(let i=0;i<7;i++) if(i!==di) recDays.push(i); }
          else if(rec==='weekdays'){ for(let i=0;i<5;i++) if(i!==di) recDays.push(i); }
          else if(rec==='monthly'){ /* only current day */ }
          recDays.forEach(rdi=>{
            for(let k=0;k<slots&&si+k<TOTAL_SLOTS;k++)
              calState[rdi][si+k]={bg:cat.bg,color:cat.color,label,sub:cat.name||'',taskId:t.id+'_r'+rdi};
          });
        }
        setTimeout(()=>renderCal(),50);
      }
    }
  }
  // Salvar em TASK_DATA
  ['semana','mes','nexus'].forEach(tab=>{
    const t=TASK_DATA[tab].find(x=>x.id===currentDetailId);
    if(t) t[field]=value;
  });
  // Salvar em CARD_DEFS_BY_TAB (campo 'label' → 'l', 'note' → 'n')
  const fieldMap={label:'l',note:'n'}; // note stores HTML for rich text
  Object.values(CARD_DEFS_BY_TAB).forEach(defs=>{
    defs.forEach(card=>{
      const t=card.tasks?.find(x=>x.id===currentDetailId);
      if(t){
        const f=fieldMap[field]||field;
        t[f]=value;
        if(field==='label') t.l=value;
        if(field==='note') t.n=value;
        if(!['label','note'].includes(field)) t[field]=value;
      }
    });
  });
  // Preserve active category filter when re-rendering after detail save
  if(currentFilterCat) filterTasksBy(currentFilterCat);
  else renderTaskPanelForKey(currentSidebarKey);
  saveState();
}

function renderSubtasks(t){
  const wrap=document.getElementById('td-subtasks');
  if(!wrap) return;
  const subs=t.subtasks||[];
  wrap.innerHTML=subs.map((s,i)=>`

function addSubtask(){
  if(!currentDetailId) return;
  const t=getAllTask(currentDetailId);
  if(!t) return;
  if(!t.subtasks) t.subtasks=[];
  t.subtasks.push({id:'s'+Date.now(),label:'',done:false});
  renderSubtasks(t);
  // Focar no último input
  const inputs=document.querySelectorAll('.subtask-label');
  if(inputs.length) inputs[inputs.length-1].focus();
  saveState();
}

function toggleSubtask(taskId, idx){
  const t=getAllTask(taskId);
  if(!t||!t.subtasks) return;
  t.subtasks[idx].done=!t.subtasks[idx].done;
  renderSubtasks(t);
  renderTaskPanelForKey(currentSidebarKey);
  saveState();
}

function renameSubtask(taskId, idx, val){
  const t=getAllTask(taskId);
  if(!t||!t.subtasks) return;
  t.subtasks[idx].label=val;
  saveState();
}

function deleteSubtask(taskId, idx){
  const t=getAllTask(taskId);
  if(!t||!t.subtasks) return;
  t.subtasks.splice(idx,1);
  renderSubtasks(t);
  saveState();
}

function deleteTaskFromDetail(){
  if(!currentDetailId) return;
  deleteTask(currentDetailId,null);

}

function reassignTaskCategory(taskId, newCatId){
  // Update in TASK_DATA
  ['semana','mes','nexus'].forEach(tab=>{
    const t=TASK_DATA[tab].find(x=>x.id===taskId);
    if(t) t.catId=newCatId;
  });
  // Update in CARD_DEFS_BY_TAB (move task between cards)
  let foundTask=null, foundFromCard=null;
  Object.values(CARD_DEFS_BY_TAB).forEach(defs=>{
    defs.forEach(card=>{
      const idx=card.tasks.findIndex(t=>t.id===taskId);
      if(idx>=0){ foundTask={...card.tasks[idx]}; foundFromCard=card; card.tasks.splice(idx,1); }
    });
  });
  if(foundTask){
    // Find target card matching newCatId or first card of that tab
    let placed=false;
    Object.values(CARD_DEFS_BY_TAB).forEach(defs=>{
      const card=defs.find(c=>c.id===newCatId);
      if(card&&!placed){ card.tasks.unshift(foundTask); placed=true; }
    });
    if(!placed && foundFromCard) foundFromCard.tasks.unshift(foundTask);
  }
  saveState();
  renderTaskPanelForKey(currentSidebarKey);
}

// ── ALARMES ──
const activeAlarms={};

function scheduleAlarm(task){
  if(!task.alarm||!task.due) return;
  const due=new Date(task.due);
  due.setHours(23,59,0,0);
  // Parsear offset do alarme: "9h" = 9h do dia, "30 min antes" = 30min antes da meia-noite
  let fireAt=new Date(due);
  const m30=task.alarm.match(/(\d+)\s*min/i);
  const mH=task.alarm.match(/^(\d+)h/i);
  if(m30) fireAt=new Date(due.getTime()-parseInt(m30[1])*60000);
  else if(mH){fireAt=new Date(due);fireAt.setHours(parseInt(mH[1]),0,0,0);}

  const now=Date.now();
  const delay=fireAt.getTime()-now;
  if(delay<=0||delay>7*24*3600*1000) return; // só alarmes dentro de 7 dias

  if(activeAlarms[task.id]) clearTimeout(activeAlarms[task.id]);
  activeAlarms[task.id]=setTimeout(()=>{
    fireAlarm(task);
  }, delay);
}

function fireAlarm(task){
  const cat=getCat(task.catId);
  // Notificação nativa se permitida
  if(Notification.permission==='granted'){
    new Notification(`⏰ ${task.label}`, {
      body: `${cat.icon} ${cat.name}${task.due?' · '+dueDateLabel(task.due):''}`,
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="24" font-size="24">⏰</text></svg>'
    });
  }
  // Alerta visual no painel
  showAlarmBanner(task);
}

function showAlarmBanner(task){
  const cat=getCat(task.catId);
  const banner=document.createElement('div');
  banner.style.cssText=`position:fixed;top:16px;right:16px;z-index:9999;

// Ghost visual durante drag
function removeGhost(){
  document.querySelectorAll('.drop-ghost').forEach(g=>g.remove());
}

// Bind drop de tarefa
function bindTaskDrop(row,di,si){
  row.addEventListener('dragover',e=>{
    if(!draggingTask)return;
    e.preventDefault();
    e.dataTransfer.dropEffect='copy';
    removeGhost();
    const ghost=document.createElement('div');
    ghost.className='drop-ghost';
    ghost.style.top='2px';
    ghost.style.height=(28*2-4)+'px';
    row.appendChild(ghost);
  });
  row.addEventListener('dragleave',e=>{
    if(!e.currentTarget.contains(e.relatedTarget)) removeGhost();
  });
  row.addEventListener('drop',e=>{
    if(!draggingTask)return;
    e.preventDefault();
    removeGhost();
    const t=draggingTask;
    const cat=getCat(t.catId);
    const label=t.label.length>22?t.label.slice(0,20)+'…':t.label;
    const _slots3=parseDurationToSlots(draggingTask?.duration||'');
    const _tDragId3=draggingTask?.id||null;
    for(let _k=0;_k<_slots3&&si+_k<TOTAL_SLOTS;_k++) calState[di][si+_k]={bg:cat.bg,color:cat.color,label,sub:cat.name,taskId:_tDragId3};
    renderCal();
    // NÃO marcar como done — só ao dar check manualmente
    draggingTask=null;
  });
}

function openExtLink(id){
  const link=extLinks.find(l=>l.id===id);
  if(!link) return;
  currentExtUrl=link.url;
  document.querySelectorAll('.sb-item,.sb-ext-link').forEach(el=>el.classList.remove('active'));
  document.getElementById('sbext-'+id)?.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-ext').classList.add('active');
  document.getElementById('subbar').style.display='none';
  document.getElementById('legbar').style.display='none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const urlEl=document.getElementById('iframe-url-display');
  if(urlEl) urlEl.textContent=link.url;
  const faviconEl=document.getElementById('iframe-favicon');
  if(faviconEl) faviconEl.textContent=link.emoji||'🔗';
  const container=document.getElementById('iframe-container');
  container.innerHTML='';
  container.style.cssText='display:flex;flex-direction:column;flex:1;min-height:0';

  // Mostrar tela de bloqueio imediatamente como fallback — o iframe aparece por cima se carregar
  function showBlocked(reason){
    container.innerHTML=`
      <div class="iframe-blocked">
        <div class="iframe-blocked-icon">${link.emoji||'🔗'}</div>
        <div style="font-size:16px;font-weight:700;color:var(--g800)">${link.name}</div>
        <div class="iframe-blocked-msg">
          ${reason}<br><br>
          <strong>Solução para Chrome:</strong> instale a extensão gratuita
          <a href="https://chrome.google.com/webstore/detail/ignore-x-frame-headers/gleekbfjekiniecknbkamfmkohkpodhe" target="_blank" style="font-weight:600">
            Ignore X-Frame-Headers ↗
          </a>
          — depois de instalar, o site abre normalmente aqui dentro.
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
          <button class="iframe-btn" onclick="tryLoadIframe('${link.id}')"
            style="padding:8px 18px;font-size:13px">↺ Tentar carregar</button>
          <button class="iframe-btn" onclick="openIframeExternal()"
            style="padding:8px 18px;font-size:13px;background:var(--accent);color:white;border-color:var(--accent)">
            ↗ Abrir em nova aba
          </button>
        </div>
      </div>`;
  }

  // Tentar carregar o iframe
  function tryLoad(){
    container.innerHTML='';
    const frame=document.createElement('iframe');
    frame.className='embed';
    frame.src=link.url;
    frame.setAttribute('allow','clipboard-read;clipboard-write');
    frame.style.cssText='flex:1;border:none;width:100%;min-height:0;display:block';
    let didLoad=false;

    frame.addEventListener('load',()=>{
      // load dispara mesmo em erro/bloqueio, mas podemos tentar acessar contentDocument
      didLoad=true;
      try{
        // Se X-Frame-Options bloqueou, contentDocument será null ou inacessível
        const doc=frame.contentDocument||frame.contentWindow?.document;
        // Se chegou aqui sem erro, provavelmente carregou
      } catch(e){
        // CORS error = carregou mas em domínio diferente = OK (cross-origin)
        // não mostrar erro nesse caso
      }
    });

    frame.addEventListener('error',()=>{
      showBlocked('A conexão com <strong>'+link.name+'</strong> foi recusada. O site não permite ser aberto dentro de outros sites (X-Frame-Options ou CSP).');
    });

    // Timeout curto: se em 2s o evento load não veio, é conexão recusada
    const t=setTimeout(()=>{
      if(!didLoad){
        showBlocked('A conexão com <strong>'+link.name+'</strong> foi recusada ou está demorando demais. O site pode não permitir ser embutido em iframe.');
      }
    },2000);

    frame.addEventListener('load',()=>clearTimeout(t));
    container.appendChild(frame);
  }

  tryLoad();
}

function rgbToHex(rgb){
  if(!rgb||rgb.startsWith('#')) return rgb||'#000000';
  const m=rgb.match(/\d+/g);
  if(!m||m.length<3) return '#000000';
  return '#'+m.slice(0,3).map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
}

function applyDesignToDOM(d){
  if(!d) return;
  const root=document.documentElement;
  if(d.fontFamily) root.style.setProperty('--ff',d.fontFamily);
  if(d.fontSize)   root.style.setProperty('--fs',d.fontSize+'px');
  if(d.radius)     root.style.setProperty('--radius',d.radius+'px');
  if(d.accent)     root.style.setProperty('--accent',d.accent);
  if(d.g800)       root.style.setProperty('--g800',d.g800);
  if(d.outerBg)    root.style.setProperty('--card-outer-bg',d.outerBg);

  if(d.outerBg) document.body.style.background=d.outerBg;
  if(d.sidebarBg) document.querySelectorAll('.sidebar').forEach(el=>el.style.background=d.sidebarBg);
  if(d.sidebarW)  document.querySelectorAll('.sidebar').forEach(el=>el.style.width=d.sidebarW+'px');
  if(d.topbarHeight) document.querySelectorAll('.topbar').forEach(el=>el.style.height=d.topbarHeight+'px');

  // Injetar CSS dinâmico para today + abas
  let styleEl=document.getElementById('dp-dynamic-css');
  if(!styleEl){styleEl=document.createElement('style');styleEl.id='dp-dynamic-css';document.head.appendChild(styleEl);}
  let css='';
  if(d.todayColor) css+=`.day-num.today{color:${d.todayColor}!important;font-weight:700;}\n`;
  if(d.tabBg)      css+=`.cl-card{background:${d.tabBg}!important;}\n`;
  if(d.tabCardRadius) css+=`.cl-card{border-radius:${d.tabCardRadius}px!important;}\n`;
  if(d.tabFontSize){
    css+=`.cl-item-text,.cl-item{font-size:${d.tabFontSize}px!important;}\n`;
    css+=`.cl-title{font-size:${Math.min(d.tabFontSize+1,16)}px!important;}\n`;
  }
  if(d.tabStyle==='compact') css+=`.cl-item{padding:4px 14px!important;}\n`;
  else if(d.tabStyle==='airy') css+=`.cl-item{padding:12px 18px!important;}\n`;
  if(d.tabCols) css+=`.cl-wrap{grid-template-columns:repeat(${d.tabCols},1fr)!important;}\n`;
  styleEl.textContent=css;

  // Labels da sidebar
  if(d.lblLogo){const el=document.getElementById('sb-logo-txt');if(el)el.textContent=d.lblLogo;}
  if(d.lblHello){const el=document.getElementById('sb-hello');if(el)el.value=d.lblHello;}
  if(d.labels){
    Object.entries(d.labels).forEach(([k,v])=>{
      const el=document.querySelector(`.sb-item-lbl[data-key="${k}"]`);
      if(el) el.textContent=v;
    });
  }

  // Visibilidade do widget de horas
  const hw=document.getElementById('sb-widget-hours');
  if(hw) hw.style.display=d.showHours===false?'none':'block';
}

function saveState(){
  try{
    // Checks das checklists
    localStorage.setItem(LS+'clChecked', JSON.stringify(clChecked));
    // Estado das tarefas do painel (done/agendada)
    localStorage.setItem(LS+'taskDoneState', JSON.stringify(taskDoneState));
    localStorage.setItem(LS+'scheduledTasks', JSON.stringify([...scheduledTasks]));
    // Categorias editadas/criadas
    localStorage.setItem(LS+'CATEGORIES', JSON.stringify(CATEGORIES));
    // Ordem dos cards
    localStorage.setItem(LS+'cardOrder', JSON.stringify(cardOrder));
    // CARD_DEFS_BY_TAB (tarefas adicionadas/renomeadas)
    localStorage.setItem(LS+'CARD_DEFS_BY_TAB', JSON.stringify(CARD_DEFS_BY_TAB));
    // TASK_DATA (tarefas do painel)
    localStorage.setItem(LS+'TASK_DATA', JSON.stringify(TASK_DATA));
    // Calendário — salvar apenas blocos não-fixos
    const calSave={};
    for(let d=0;d<7;d++){
      calSave[d]={};
      Object.entries(calState[d]).forEach(([si,bd])=>{
        if(bd&&!bd.fixed) calSave[d][si]=bd;
      });
    }
    localStorage.setItem(LS+'calState', JSON.stringify(calSave));
    // Overlays
    localStorage.setItem(LS+'overlays', JSON.stringify(overlays));
  } catch(e){ console.warn('Erro ao salvar:', e); }
}

function loadState(){
  try{
    const cc=localStorage.getItem(LS+'clChecked');
    if(cc){ Object.assign(clChecked, JSON.parse(cc)); }

    const td=localStorage.getItem(LS+'taskDoneState');
    if(td){ Object.assign(taskDoneState, JSON.parse(td)); }

    const st=localStorage.getItem(LS+'scheduledTasks');
    if(st){ JSON.parse(st).forEach(id=>scheduledTasks.add(id)); }

    const cats=localStorage.getItem(LS+'CATEGORIES');
    if(cats){ CATEGORIES.length=0; JSON.parse(cats).forEach(c=>CATEGORIES.push(c)); }

    const co=localStorage.getItem(LS+'cardOrder');
    if(co){ Object.assign(cardOrder, JSON.parse(co)); }

    const cdbt=localStorage.getItem(LS+'CARD_DEFS_BY_TAB');
    if(cdbt){
      const loaded=JSON.parse(cdbt);
      Object.keys(loaded).forEach(tab=>{ CARD_DEFS_BY_TAB[tab]=loaded[tab]; });
    }

    const tdata=localStorage.getItem(LS+'TASK_DATA');
    if(tdata){
      const loaded=JSON.parse(tdata);
      Object.keys(loaded).forEach(tab=>{ TASK_DATA[tab]=loaded[tab]; });
    }

    // Blocos do calendário
    const cs=localStorage.getItem(LS+'calState');
    if(cs){
      const loaded=JSON.parse(cs);
      // Support both old format (d=0..6) and new format (wk=weekOffset)
      const firstKey=Object.keys(loaded)[0];
      if(firstKey&&isNaN(firstKey)){
        // New format: weekStore
        Object.keys(loaded).forEach(wk=>{
          weekStore[wk]={};
          for(let d=0;d<7;d++){
            weekStore[wk][d]={};
            Object.entries(loaded[wk]?.[d]||{}).forEach(([si,bd])=>{ weekStore[wk][d][parseInt(si)]=bd; });
          }
        });
        loadWeek(weekOffset);
      } else {
        // Old format: just load into current week
        Object.keys(loaded).forEach(d=>{
          Object.entries(loaded[d]).forEach(([si,bd])=>{ calState[d][parseInt(si)]=bd; });
        });
      }
    }

    // Overlays
    const ov=localStorage.getItem(LS+'overlays');
    if(ov){
      const loaded=JSON.parse(ov);
      Object.keys(loaded).forEach(k=>{ overlays[k]=loaded[k]; });
    }
  } catch(e){ console.warn('Erro ao carregar:', e); }
}

// ── RESIZE DO TASK PANEL (esquerda e direita) ──
function initTaskPanelResize(){
  const panel=document.getElementById('task-panel');
  function makeResizer(handle, side){
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();
      handle.classList.add('active');
      const startX=e.clientX;
      const startW=panel.offsetWidth;
      function onMove(ev){
        let newW;
        if(side==='r') newW=startW+(ev.clientX-startX);
        else newW=startW-(ev.clientX-startX);
        panel.style.width=Math.max(120,Math.min(480,newW))+'px';
      }
      function onUp(){
        handle.classList.remove('active');
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
      }
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  }
  const hl=document.getElementById('tp-resize-l');
  const hr=document.getElementById('tp-resize-r');
  if(hl) makeResizer(hl,'l');
  if(hr) makeResizer(hr,'r');
}

// APPS SCRIPT SYNC — Google Sheets via Apps Script (gratuito, sem limite)
// ═══════════════════════════════════════════
// SYNC_URL moved to top
let _syncTimeout = null;
let _lastSync = 0;

function showSyncStatus(s){
  const el = document.getElementById('sync-status');
  if(!el) return;
  const map = {syncing:'⟳', ok:'✓', error:'⚠', idle:''};
  const colors = {syncing:'var(--g400)', ok:'#81c784', error:'#e57373', idle:'var(--g300)'};
  el.textContent = map[s]||'';
  el.style.color = colors[s]||'';
  el.title = s==='error'?'Erro ao sincronizar':s==='ok'?'Salvo na nuvem':'';
  if(s==='ok') setTimeout(()=>showSyncStatus('idle'), 3000);
}

function buildSnapshot(){
  return JSON.stringify({
    ts: Date.now(),
    TASK_DATA,
    CARD_DEFS_BY_TAB,
    CATEGORIES,
    taskDoneState,
    scheduledTasks: [...scheduledTasks],
    clChecked,
    calState,
    weekStore
  });
}

async function syncToAppsScript(){
  showSyncStatus('syncing');
  try{
    const snapshot = buildSnapshot();
    // Verify snapshot has real data before saving
    const parsed = JSON.parse(snapshot);
    const hasData = (parsed.TASK_DATA?.semana?.length > 0) ||
      Object.values(parsed.CARD_DEFS_BY_TAB||{}).some(defs=>defs.some(c=>c.tasks?.length>0)) ||
      Object.keys(parsed.calState||{}).some(d=>Object.keys(parsed.calState[d]||{}).length>0);
    
    const resp = await fetch(SYNC_URL, {
      method: 'POST',
      headers: {'Content-Type':'text/plain'},
      body: JSON.stringify({action:'save', value:snapshot})
    });
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const result = await resp.json();
    if(!result.ok) throw new Error(JSON.stringify(result));
    
    _lastSync = Date.now();
    localStorage.setItem(LS+'syncTs', _lastSync);
    showSyncStatus('ok');
  } catch(e){
    console.error('Sync error:', e);
    showSyncStatus('error');
  }
}

async function loadFromAppsScript(){
  showSyncStatus('syncing');
  try{
    const resp = await fetch(SYNC_URL+'?action=load');
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const result = await resp.json();
    
    if(!result.value){
      showSyncStatus('idle');
      return; // No cloud data yet
    }
    
    const snap = JSON.parse(result.value);
    
    // Only apply if cloud is newer than local
    const localTs = parseInt(localStorage.getItem(LS+'syncTs')||'0');
    if(snap.ts && snap.ts <= localTs){
      showSyncStatus('idle');
      return;
    }
    
    // Apply snapshot
    if(snap.TASK_DATA) Object.assign(TASK_DATA, snap.TASK_DATA);
    if(snap.CATEGORIES?.length){ CATEGORIES.length=0; snap.CATEGORIES.forEach(c=>CATEGORIES.push(c)); }
    if(snap.CARD_DEFS_BY_TAB) Object.keys(snap.CARD_DEFS_BY_TAB).forEach(tab=>{ CARD_DEFS_BY_TAB[tab]=snap.CARD_DEFS_BY_TAB[tab]; });
    if(snap.taskDoneState) Object.assign(taskDoneState, snap.taskDoneState);
    if(snap.scheduledTasks) snap.scheduledTasks.forEach(id=>scheduledTasks.add(id));
    if(snap.clChecked) Object.assign(clChecked, snap.clChecked);
    if(snap.calState) for(let d=0;d<7;d++) calState[d]=snap.calState[d]||{};
    if(snap.weekStore) Object.keys(snap.weekStore).forEach(k=>{ weekStore[k]=snap.weekStore[k]; });
    
    localStorage.setItem(LS+'syncTs', snap.ts||Date.now());
    
    showSyncStatus('ok');
    renderCal();
    renderSidebarCats();
    renderTaskPanelForKey('semana');
    renderPicker();
  } catch(e){
    console.warn('Load failed, using localStorage:', e);
    showSyncStatus('idle');
  }
}

};

  <!-- HEADER -->
  <div class="task-detail-hdr" id="td-drag-handle" style="cursor:move;padding:10px 16px 8px;">
    <div class="task-cb" id="td-cb" onclick="toggleDetailDone()" style="width:16px;height:16px;flex-shrink:0;cursor:pointer;" onmousedown="event.stopPropagation()"></div>
    <div style="position:relative;display:flex;align-items:center;gap:4px;cursor:pointer;" id="td-cat-wrap" onclick="toggleCatDropdown()">
      <span id="td-cat-dot" style="width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;"></span>
      <span id="td-cat-lbl" style="font-size:11px;color:var(--g500);max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></span>
      <span style="font-size:9px;color:var(--g300);">▾</span>
      <div id="td-cat-dropdown" style="display:none;position:absolute;top:100%;left:0;background:white;border:1px solid var(--g150);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:999;min-width:150px;padding:4px 0;max-height:200px;overflow-y:auto;"></div>
    </div>
    <!-- Meta chip: data + horário + duração em um só -->
    <div style="display:flex;align-items:center;gap:4px;margin-left:8px;flex:1;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;background:var(--g50);border:1px solid var(--g150);border-radius:20px;overflow:hidden;">
        <button onclick="toggleDueCal()" style="font-size:10px;color:var(--g500);background:none;border:none;border-right:1px solid var(--g150);padding:3px 8px;cursor:pointer;font-family:inherit;white-space:nowrap;">
          <span id="td-due-label">data</span>
        </button>
        <select id="td-time" onchange="saveDetailField('time',this.value)" style="font-size:10px;color:var(--g500);background:none;border:none;border-right:1px solid var(--g150);padding:3px 6px;cursor:pointer;font-family:inherit;outline:none;max-width:72px;">
          <option value="">horário</option>
        </select>
        <select id="td-duration" onchange="saveDetailField('duration',this.value)" style="font-size:10px;color:var(--g500);background:none;border:none;border-right:1px solid var(--g150);padding:3px 6px;cursor:pointer;font-family:inherit;outline:none;max-width:72px;">
          <option value="">duração</option>
        </select>
        <select id="td-recurrence" onchange="saveDetailField('recurrence',this.value)" style="font-size:10px;color:var(--g500);background:none;border:none;padding:3px 6px;cursor:pointer;font-family:inherit;outline:none;max-width:80px;">
          <option value="">recorrência</option>
          <option value="daily">todo dia</option>
          <option value="weekdays">seg – sex</option>
          <option value="monthly">todo mês</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:4px;flex-shrink:0;">
      <button class="task-detail-close" id="td-expand-btn" onclick="toggleDetailExpand()" onmousedown="event.stopPropagation()" title="Expandir">⤢</button>
      <button class="task-detail-close" onclick="closeTaskDetail()" onmousedown="event.stopPropagation()">✕</button>
    </div>
  </div>

  <!-- Due date calendar (hidden) -->
  <div class="due-picker" id="td-due-picker" style="position:relative;">
    <div class="due-cal" id="td-due-cal" style="top:0;left:16px;">
      <div class="due-cal-hdr">
        <button onclick="duCalShift(-1)">‹</button>
        <span class="cal-month" id="duc-month-label"></span>
        <button onclick="duCalShift(1)">›</button>
      </div>
      <div class="due-cal-shortcuts">
        <button class="due-shortcut" onclick="setDueShortcut('today')"><span class="sc-icon">☀️</span><span class="sc-lbl">Hoje</span></button>
        <button class="due-shortcut" onclick="setDueShortcut('tomorrow')"><span class="sc-icon">🌅</span><span class="sc-lbl">Amanhã</span></button>
        <button class="due-shortcut" onclick="setDueShortcut('week')"><span class="sc-icon">📅</span><span class="sc-lbl">7d</span></button>
      </div>
      <div class="due-cal-grid">
        <div class="due-cal-days" id="duc-daynames"></div>
        <div class="due-cal-days" id="duc-days"></div>
      </div>
      <div class="due-cal-footer">
        <button class="due-cal-clear" onclick="clearDueDate()">Limpar</button>
        <button class="due-cal-ok" onclick="closeDueCal()">OK</button>
      </div>
    </div>
  </div>

  <!-- TÍTULO -->
  <div style="padding:8px 16px 4px;flex-shrink:0;">
    <textarea class="task-detail-title" id="td-title" rows="1"
      placeholder="Título da tarefa"
      oninput="autoResizeTextarea(this);saveDetailTitle()"
      style="font-size:16px;"></textarea>
  </div>

  <!-- TOOLBAR sempre visível -->
  <div class="td-rich-toolbar" id="td-rich-toolbar" style="display:flex;padding:2px 16px;border-bottom:1px solid var(--g100);margin-bottom:0;">
    <button class="td-rich-btn" onclick="tdFmt('bold')"><b>B</b></button>
    <button class="td-rich-btn" onclick="tdFmt('italic')"><i>I</i></button>
    <button class="td-rich-btn" onclick="tdFmt('superscript')" style="font-size:10px;">x²</button>
    <div class="td-rich-sep"></div>
    <button class="td-rich-btn" onclick="tdInsertCheckbox()">☑</button>
    <button class="td-rich-btn" onclick="tdInsertHR()">─</button>
    <div class="td-rich-sep"></div>
    <button class="td-rich-btn" onclick="tdFmt('insertUnorderedList')">•</button>
    <button class="td-rich-btn" onclick="tdFmt('insertOrderedList')">1.</button>
  </div>

  <!-- NOTAS — rich contenteditable -->
  <div style="flex:1;display:flex;flex-direction:column;min-height:0;" id="td-note-wrap">
    <div class="td-rich-editor" id="td-note-rich" contenteditable="true"
      data-placeholder="Notas, links, contexto…"
      style="flex:1;padding:10px 16px;outline:none;font-family:inherit;font-size:13px;line-height:1.7;color:var(--g800);overflow-y:auto;min-height:0;resize:none;"
      oninput="saveDetailField('note',this.innerHTML||'')"
    ></div>
    <!-- Hidden textarea for compatibility -->
    <textarea id="td-note" style="display:none;" oninput="saveDetailField('note',this.value)"></textarea>
  </div>

  <!-- SUBTAREFAS -->
  <div style="padding:6px 16px;flex-shrink:0;max-height:140px;overflow-y:auto;">
    <div class="subtask-list" id="td-subtasks"></div>
    <button class="add-subtask-btn" onclick="addSubtask()">＋ subtarefa</button>
  </div>

  <!-- FOOTER -->
  <div class="task-detail-footer" style="padding:8px 16px;">
    <button class="td-btn-del" onclick="deleteTaskFromDetail()">apagar</button>
    <button class="td-btn-pri" onclick="closeTaskDetail()">ok</button>
  </div>
</div>

</div><!-- /app-card -->

<div class="dp-overlay" id="dp-overlay" onclick="closeDesignPanel()"></div>
<div class="dp-panel" id="dp-panel">
  <div class="dp-hdr">
    <div class="dp-title">✦ Aparência</div>
    <button class="dp-close" onclick="closeDesignPanel()">✕</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
  <div class="dp-footer">
    <button class="dp-btn-sec" onclick="resetDesign()">↺ Resetar</button>
    <button class="dp-btn-pri" onclick="applyDesign()">Aplicar e salvar</button>
  </div>
</div>

</body>
</html>
