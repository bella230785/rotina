<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ff:'Schibsted Grotesk',sans-serif;
  --fs:14px;--lh:1.5;
  --accent:#4A90E2;--accent-l:#EBF3FD;
  --red:#E53E3E;
  --g50:#F7F7F8;--g100:#EFEFEF;--g150:#E5E5E5;--g200:#D5D5D5;
  --g300:#B0B0B0;--g400:#909090;--g500:#707070;--g700:#404040;--g800:#1A1A1A;
  --white:#fff;--radius:10px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 2px 12px rgba(0,0,0,.04);
  --card-outer-bg:#e8edf2;  /* cor do fundo externo ao card — configurável */
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--ff) !important;font-size:var(--fs) !important;
  line-height:var(--lh) !important;letter-spacing:0.15px;
  -webkit-font-smoothing:antialiased !important;-moz-osx-font-smoothing:grayscale !important;
  text-rendering:optimizeLegibility !important;
  background:var(--card-outer-bg);color:var(--g800);
  height:100vh;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  padding:14px;
}
/* Card principal que envolve todo o app */
.app-card{
  width:100%;height:100%;
  background:white;
  border-radius:16px;
  overflow:hidden;
  display:flex;
  box-shadow:0 8px 40px rgba(0,0,0,.18);
}

/* ── SIDEBAR ── */
.sidebar{
  width:196px;flex-shrink:0;background:var(--white);
  border-right:1px solid var(--g100);
  display:flex;flex-direction:column;padding:14px 0;overflow-y:auto;overflow-x:hidden;
}
.sb-logo{font-size:17px;font-weight:700;color:var(--g800);padding:2px 16px 12px;letter-spacing:-.01em;}
.sb-user{display:flex;align-items:center;gap:8px;padding:4px 12px 12px;}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent-l);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0;}
.sb-username{font-size:13px;font-weight:600;color:var(--g800);}
.sb-section{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--g300);padding:10px 16px 4px;}
.sb-item{display:flex;align-items:center;gap:7px;padding:5px 10px;font-size:13px;font-weight:500;color:var(--g500);cursor:pointer;transition:all .12s;border-radius:6px;margin:1px 6px;}
.sb-item:hover{background:var(--g50);color:var(--g700);}
.sb-item.active{background:var(--g50);color:var(--g800);font-weight:600;}
.sb-item-icon{display:none;}
.sb-item-badge{margin-left:auto;font-size:11px;font-weight:600;color:var(--g400);background:var(--g100);padding:1px 6px;border-radius:20px;}
.sb-sep{height:1px;background:var(--g100);margin:8px 12px;}
.sb-bottom{margin-top:auto;padding:8px 6px 0;}
.sb-icon-row{display:flex;gap:2px;}
.sb-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .12s;color:var(--g400);border:none;background:none;}
.sb-icon:hover{background:var(--g50);color:var(--g700);}
.sb-icon.active{background:var(--g100);color:var(--g800);}
/* Campo "hello" editável inline */
.sb-hello{
  font-size:13px;font-weight:500;color:var(--g500);
  padding:4px 10px;margin:1px 6px;border-radius:6px;
  display:block;width:calc(100% - 12px);
  border:none;outline:none;background:none;font-family:inherit;
  cursor:default;
}
.sb-hello:focus{background:var(--g50);cursor:text;outline:none;}
.sb-hello:hover{color:var(--g700);}

/* ── TASK PANEL ── */
.task-panel{
  width:210px;min-width:120px;max-width:420px;
  flex-shrink:0;background:var(--white);
  border-right:1px solid var(--g100);
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}
.task-panel-resize-l,.task-panel-resize-r{
  position:absolute;top:0;width:5px;height:100%;
  cursor:col-resize;z-index:30;background:transparent;
}
.task-panel-resize-l{left:0;}
.task-panel-resize-r{right:0;}
.task-panel-resize-l:hover,.task-panel-resize-r:hover,
.task-panel-resize-l.active,.task-panel-resize-r.active{
  background:rgba(74,144,226,.35);
}
.task-panel-hdr{padding:14px 14px 8px;flex-shrink:0;}
.task-panel-cat-title{
  font-size:14px;font-weight:700;color:var(--g800);
  margin-bottom:10px;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
/* Input de adição rápida estilo TickTick */
.tp-add-wrap{
  display:flex;align-items:center;
  border:1px solid var(--g150);border-radius:8px;
  background:var(--g50);margin-bottom:2px;
  transition:border-color .15s,background .15s;
}
.tp-add-wrap:focus-within{background:white;border-color:var(--accent);}
.tp-add-input{
  flex:1;border:none;background:none;outline:none;
  font-family:inherit;font-size:12px;color:var(--g800);
  padding:8px 10px;
}
.tp-add-input::placeholder{color:var(--g300);}
.task-panel-title{font-size:17px;font-weight:600;color:var(--g800);margin-bottom:10px;}
.task-tabs{display:none;}
.task-tab{display:none;}

.task-filters{display:flex;gap:4px;padding:8px 16px 6px;flex-wrap:wrap;flex-shrink:0;}
.tf{font-size:11px;padding:2px 10px;border-radius:20px;border:none;background:none;cursor:pointer;font-family:inherit;color:var(--g400);transition:all .12s;white-space:nowrap;}
.tf:hover{color:var(--g700);background:var(--g50);}
.tf.active{color:var(--g800);font-weight:600;}
.tf.active::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--g800);margin-right:5px;vertical-align:middle;}
.tf.p1f.active{color:#b91c1c;}
.tf.p1f.active::before{background:#b91c1c;}
.tf.p2f.active{color:#d97706;}
.tf.p2f.active::before{background:#d97706;}

.task-list{flex:1;overflow-y:auto;padding:4px 0;}

/* ── ESTILO TICKTICK — item de tarefa ── */
.task-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:7px 16px;
  background:none;cursor:pointer;
  transition:background .08s;font-size:13px;color:var(--g800);
  user-select:none;position:relative;
  border:none;border-radius:0;box-shadow:none;
}
.task-item:hover{background:var(--g50);}
.task-item.dragging-task{opacity:.3;}
.task-item.done-task .task-item-label{text-decoration:line-through;color:var(--g300);}
.task-item.scheduled .task-item-label{color:var(--g400);}

/* Checkbox redondo estilo TickTick */
.task-cb{
  width:16px;height:16px;border-radius:50%;
  border:1.5px solid var(--g300);flex-shrink:0;margin-top:2px;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;
  background:none;
}
.task-cb:hover{border-color:var(--accent);}
.task-cb.checked{background:var(--accent);border-color:var(--accent);}
.task-cb.checked::after{content:'✓';font-size:9px;font-weight:700;color:white;}

.task-item-body{flex:1;min-width:0;}
.task-item-label{line-height:1.45;word-break:break-word;font-size:12px;}
.task-item-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap;}
.task-due{font-size:11px;color:var(--g400);display:flex;align-items:center;gap:3px;}
.task-due.overdue{color:#dc2626;}
.task-due.today{color:#cf6d9e;}
.task-due.soon{color:#d97706;}
.task-alarm{font-size:11px;color:var(--g400);}
.task-sub-count{font-size:11px;color:var(--g400);}
.task-scheduled-badge{font-size:10px;color:#cf6d9e;margin-left:4px;}

/* Barra de cor da categoria — linha esquerda fina */
.task-item[data-cat-color]{border-left:2px solid transparent;}

/* Ações ao hover — aparecem à direita */
.task-item-actions{display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);gap:2px;background:var(--g50);border-radius:6px;padding:2px;}
.task-item:hover .task-item-actions{display:flex;}
.task-action-btn{font-size:11px;background:none;border:none;border-radius:4px;padding:3px 5px;cursor:pointer;color:var(--g400);font-family:inherit;line-height:1;}
.task-action-btn:hover{background:var(--g100);color:var(--g800);}
.task-action-btn.del:hover{color:#dc2626;}

.task-section-label{font-size:11px;font-weight:600;color:var(--g400);padding:10px 16px 4px;display:flex;align-items:center;gap:6px;}
.task-add{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:13px;color:var(--g300);background:none;border:none;font-family:inherit;width:100%;text-align:left;transition:color .12s;}
.task-add:hover{color:var(--accent);}
/* Grupos de categoria no task panel */
.tp-cat-group{margin-bottom:4px;}
.tp-cat-group-hdr{
  display:flex;align-items:center;gap:7px;
  padding:10px 16px 5px;
}
.tp-cat-group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tp-cat-group-name{font-size:12px;font-weight:600;color:var(--g700);flex:1;}
.tp-cat-group-count{font-size:10px;color:var(--g400);background:var(--g100);padding:1px 6px;border-radius:20px;}
.tp-cat-done-toggle{
  display:flex;align-items:center;gap:6px;
  padding:5px 16px;cursor:pointer;
  font-size:11px;color:var(--g400);
  transition:color .12s;
}
.tp-cat-done-toggle:hover{color:var(--g700);}
.tp-cat-done-count{font-size:10px;background:var(--g100);padding:1px 6px;border-radius:20px;margin-left:auto;}
.tp-cat-done-arrow{font-size:9px;margin-left:4px;}

/* ── CALENDÁRIO DE DUE DATE estilo TickTick ── */
.due-picker{position:relative;display:inline-block;}
.due-picker-btn{
  display:flex;align-items:center;gap:6px;
  border:none;background:none;cursor:pointer;font-family:inherit;
  font-size:12px;padding:4px 8px;border-radius:6px;
  transition:background .12s;color:var(--g500);
}
.due-picker-btn:hover{background:var(--g50);}
.due-picker-btn.has-date{color:var(--accent);}
.due-picker-btn.overdue{color:#dc2626;}
.due-picker-btn.today-date{color:#cf6d9e;}
.due-cal{
  display:none;position:absolute;top:calc(100% + 6px);left:0;z-index:600;
  background:white;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.16);
  padding:0;width:280px;overflow:hidden;border:1px solid var(--g100);
}
.due-cal.open{display:block;}
.due-cal-hdr{
  display:flex;align-items:center;padding:14px 16px 10px;
  font-size:14px;font-weight:600;color:var(--g800);
}
.due-cal-hdr button{background:none;border:none;cursor:pointer;color:var(--g400);font-size:16px;padding:2px 6px;border-radius:4px;}
.due-cal-hdr button:hover{background:var(--g50);color:var(--g800);}
.due-cal-hdr .cal-month{flex:1;text-align:center;}
.due-cal-shortcuts{
  display:flex;gap:6px;padding:4px 16px 10px;border-bottom:1px solid var(--g100);
}
.due-shortcut{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;border-radius:8px;cursor:pointer;border:1px solid var(--g100);
  background:white;font-family:inherit;transition:all .12s;
}
.due-shortcut:hover{background:var(--g50);border-color:var(--g200);}
.due-shortcut .sc-icon{font-size:18px;}
.due-shortcut .sc-lbl{font-size:10px;color:var(--g500);}
.due-cal-grid{padding:10px 16px 6px;}
.due-cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:0;}
.due-cal-day-name{font-size:11px;color:var(--g400);text-align:center;padding:4px 0;font-weight:500;}
.due-cal-day{
  font-size:12px;text-align:center;padding:5px 2px;border-radius:6px;cursor:pointer;
  transition:background .1s;color:var(--g800);border:none;background:none;font-family:inherit;
}
.due-cal-day:hover{background:var(--g50);}
.due-cal-day.today{color:#cf6d9e;font-weight:700;}
.due-cal-day.selected{background:var(--accent);color:white;font-weight:600;}
.due-cal-day.other-month{color:var(--g300);}
.due-cal-day.past{color:var(--g300);}
.due-cal-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px 14px;border-top:1px solid var(--g100);
}
.due-cal-clear{background:none;border:none;cursor:pointer;font-size:12px;color:var(--g400);font-family:inherit;}
.due-cal-clear:hover{color:var(--g700);}
.due-cal-ok{background:var(--accent);color:white;border:none;border-radius:8px;padding:6px 20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.due-cal-ok:hover{background:#3578c8;}

.task-detail-overlay{position:fixed;inset:0;z-index:500;pointer-events:none;background:transparent;}
.task-detail-overlay.open{pointer-events:all;}
.task-detail-panel{
  position:fixed;top:10%;left:-560px;width:480px;height:70vh;min-width:320px;min-height:300px;
  background:white;z-index:501;display:flex;flex-direction:column;
  box-shadow:0 8px 40px rgba(0,0,0,.15);
  transition:left .28s cubic-bezier(.4,0,.2,1);
  border:1px solid var(--g150);border-radius:12px;overflow:hidden;
  resize:both;
}
.task-detail-panel.open{left:412px;transition:none;}
.task-detail-panel.dragging{transition:none;user-select:none;}
.td-drag-handle{
  position:absolute;top:0;left:0;right:0;height:40px;
  cursor:move;z-index:1;
}
.task-detail-hdr{
  display:flex;align-items:center;gap:10px;
  padding:14px 20px 12px;border-bottom:1px solid var(--g100);flex-shrink:0;
}
.task-detail-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--g400);padding:2px 6px;border-radius:4px;}
.task-detail-close:hover{background:var(--g50);}
.task-detail-cat{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:500;}
.task-detail-body{flex:1;overflow-y:auto;padding:0;display:flex;flex-direction:column;}
.task-detail-title{
  font-size:18px;font-weight:600;color:var(--g800);
  border:none;outline:none;width:100%;font-family:inherit;
  background:none;resize:none;line-height:1.4;margin-bottom:12px;
  min-height:28px;
}
.task-detail-title:focus{color:var(--g800);}
.task-detail-meta-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px;color:var(--g500);}
.task-detail-meta-row label{width:80px;flex-shrink:0;font-size:11px;color:var(--g400);}
.task-detail-meta-row input,.task-detail-meta-row select{border:1px solid var(--g150);border-radius:6px;padding:3px 8px;font-size:12px;font-family:inherit;outline:none;background:white;color:var(--g800);}
.task-detail-meta-row input:focus,.task-detail-meta-row select:focus{border-color:var(--accent);}
.task-detail-sep{height:1px;background:var(--g100);margin:14px 0;}
.task-detail-section{font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
/* Nota / corpo de texto */
.task-detail-note{
  width:100%;border:none;outline:none;font-family:inherit;
  font-size:13px;color:var(--g700);line-height:1.7;
  background:none;resize:none;min-height:0;flex:1;
}
.task-detail-note::placeholder{color:var(--g300);}
/* Subtarefas */
.subtask-list{display:flex;flex-direction:column;gap:2px;margin-bottom:8px;}
.subtask-item{display:flex;align-items:center;gap:8px;padding:5px 4px;border-radius:6px;transition:background .08s;}
.subtask-item:hover{background:var(--g50);}
.subtask-cb{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--g300);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.subtask-cb:hover{border-color:var(--accent);}
.subtask-cb.checked{background:var(--accent);border-color:var(--accent);}
.subtask-cb.checked::after{content:'✓';font-size:8px;font-weight:700;color:white;}
.subtask-label{flex:1;font-size:13px;color:var(--g800);border:none;outline:none;background:none;font-family:inherit;cursor:text;}
.subtask-label.done-txt{text-decoration:line-through;color:var(--g300);}
.subtask-del{background:none;border:none;color:var(--g300);cursor:pointer;font-size:12px;padding:0 3px;display:none;}
.subtask-item:hover .subtask-del{display:block;}
.subtask-del:hover{color:#dc2626;}
.add-subtask-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g300);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 4px;transition:color .12s;}
.add-subtask-btn:hover{color:var(--accent);}
.task-detail-footer{padding:14px 20px;border-top:1px solid var(--g100);display:flex;gap:8px;flex-shrink:0;}
.td-btn-pri{flex:1;background:var(--g100);color:var(--g700);border:none;border-radius:7px;padding:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.td-btn-pri:hover{background:var(--g150);}
.td-btn-del{background:none;border:1px solid var(--g150);border-radius:7px;padding:9px 14px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--g500);}
.td-btn-del:hover{background:#fee2e2;color:#dc2626;border-color:#fca5a5;}

/* Prioridade indicator — ponto colorido antes do label */
.task-item[data-prio="1"] .task-cb{border-color:#f87171;}
.task-item[data-prio="2"] .task-cb{border-color:#fbbf24;}

.task-form-field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.task-form-field label{font-size:10px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;}
.task-form-field input,.task-form-field select,.task-form-field textarea{border:1px solid var(--g150);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;color:var(--g800);outline:none;background:white;}
.task-form-field input:focus,.task-form-field select:focus{border-color:var(--accent);}
.task-form-field textarea{resize:vertical;min-height:44px;}
.priority-picker{display:flex;gap:5px;margin-top:2px;}
.pp-btn{flex:1;padding:5px 4px;border-radius:6px;border:2px solid transparent;cursor:pointer;font-size:10px;font-weight:700;font-family:inherit;text-align:center;transition:all .12s;}
.pp-btn.sel{transform:scale(1.08);box-shadow:0 0 0 2px var(--g800);}


/* ── SIDEBAR WIDGETS ── */
.sb-widget{padding:10px 12px;margin:6px 8px;border-radius:10px;background:var(--g50);border:1px solid var(--g100);}
.sb-widget-title{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--g400);margin-bottom:8px;}
.sb-donut-wrap{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.sb-donut{flex-shrink:0;}
.sb-donut-info{flex:1;min-width:0;}
.sb-donut-pct{font-size:18px;font-weight:700;color:var(--g800);line-height:1;}
.sb-donut-sub{font-size:10px;color:var(--g400);margin-top:2px;}
.sb-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.sb-bar-label{font-size:10px;color:var(--g700);width:64px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-bar-track{flex:1;height:5px;background:var(--g150);border-radius:99px;overflow:hidden;}
.sb-bar-fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.sb-bar-val{font-size:10px;color:var(--g500);width:26px;text-align:right;flex-shrink:0;}

/* Input inline para nova tarefa/categoria diretamente no card */
.cl-inline-input{
  width:100%;border:none;border-bottom:1.5px solid var(--accent);
  outline:none;font-family:inherit;font-size:11px;color:var(--g800);
  padding:4px 0;background:transparent;
}
.cl-inline-input::placeholder{color:var(--g300);}
.cl-add-row{
  display:flex;align-items:center;gap:6px;
  padding:6px 16px;border-top:1px dashed var(--g100);
}
.cl-add-icon{font-size:12px;color:var(--g300);cursor:pointer;flex-shrink:0;}
.cl-add-icon:hover{color:var(--accent);}
/* Card nova categoria — inline */
.cl-new-cat-card{
  background:transparent;border:1.5px dashed var(--g150);
  border-radius:var(--radius);overflow:hidden;
}
.cl-new-cat-input{
  width:100%;border:none;outline:none;font-family:inherit;
  font-size:12px;font-weight:600;color:var(--g800);padding:12px 16px;
  background:transparent;
}
.cl-new-cat-input::placeholder{color:var(--g300);font-weight:400;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--white);position:relative;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:6px;padding:0 18px;background:var(--white);border-bottom:1px solid var(--g100);flex-shrink:0;height:50px;}
.topbar-left{display:flex;align-items:center;gap:1px;flex:1;}
.tab{font-size:13px;font-weight:500;padding:5px 12px;cursor:pointer;color:var(--g400);transition:all .15s;border:none;background:none;font-family:var(--ff);border-bottom:2px solid transparent;padding-bottom:4px;}
.tab:hover{color:var(--g700);}
.tab.active{color:var(--g800);border-bottom-color:var(--g800);font-weight:600;}
.topbar-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.topbar-date{font-size:13px;font-weight:500;color:var(--g700);}
.btn-group{display:flex;border:1px solid var(--g150);border-radius:7px;overflow:hidden;}
.btn-group-item{font-size:12px;font-weight:500;color:var(--g500);padding:5px 11px;border:none;background:white;cursor:pointer;font-family:inherit;border-right:1px solid var(--g150);transition:all .12s;}
.btn-group-item:last-child{border-right:none;}
.btn-group-item:hover,.btn-group-item.active{background:var(--g50);color:var(--g800);}
.btn-new{background:var(--accent);color:white;border:none;border-radius:7px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-new:hover{background:#3578c8;}
.btn-today{font-size:12px;font-weight:500;color:var(--g700);border:1px solid var(--g150);border-radius:7px;padding:5px 11px;background:white;cursor:pointer;font-family:inherit;}
.btn-today:hover{background:var(--g50);}

/* ── SUBBAR ── */
.subbar{display:flex;align-items:center;gap:7px;padding:7px 18px;background:var(--white);border-bottom:1px solid var(--g100);flex-shrink:0;}
.nav-arrow{width:26px;height:26px;border-radius:7px;border:1px solid var(--g150);background:white;cursor:pointer;font-size:13px;color:var(--g500);display:flex;align-items:center;justify-content:center;font-family:inherit;}
.nav-arrow:hover{background:var(--g50);}
.today-btn{font-size:11px;font-weight:500;color:var(--g600);padding:4px 10px;border:1px solid var(--g150);border-radius:7px;background:white;cursor:pointer;font-family:inherit;}
.today-btn:hover{background:var(--g50);}
.date-range{font-size:13px;font-weight:600;color:var(--g800);}
.subbar-right{margin-left:auto;display:flex;align-items:center;gap:7px;}
.hint-pill{font-size:10px;color:var(--g300);}




/* ── VIEWS ── */
.view{display:none;flex:1;overflow:hidden;flex-direction:column;}
.view.active{display:flex;}

/* ── CALENDAR ── */
.cal-wrap{flex:1;overflow-x:hidden;overflow-y:auto;display:flex;flex-direction:column;background:white;}
.cal-hdr{display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:1px solid var(--g100);background:white;flex-shrink:0;position:sticky;top:0;z-index:10;}
.cal-hcell{padding:8px 4px;text-align:center;border-left:1px solid var(--g100);}
.cal-hcell:first-child{border-left:none;}
.day-name{font-size:10px;font-weight:600;color:var(--g300);letter-spacing:.07em;text-transform:uppercase;}
.day-num{font-size:22px;font-weight:300;color:var(--g500);line-height:1.2;margin-top:1px;}
.day-num.today{color:#cf6d9e;font-weight:700;}
.cal-body{display:grid;grid-template-columns:52px repeat(7,1fr);flex:1;}
.time-col{display:flex;flex-direction:column;}
.time-slot{height:28px;display:flex;align-items:flex-start;justify-content:flex-end;padding:3px 8px 0;font-size:10px;color:var(--g300);border-right:1px solid var(--g100);flex-shrink:0;}
.time-slot.half{border-bottom:1px solid rgba(0,0,0,.03);}
.time-slot.hour{border-bottom:1px solid var(--g100);}
.day-col{border-left:1px solid var(--g100);position:relative;display:flex;flex-direction:column;}
.half-row{height:28px;position:relative;flex-shrink:0;transition:background .08s;}
.half-row.is-hour{border-bottom:1px solid var(--g100);}
.half-row.is-half{border-bottom:1px solid rgba(0,0,0,.03);}
.half-row.drop-target{background:var(--accent-l);}
.half-row:hover:not(.has-block){background:var(--g50);}
.block{position:absolute;left:3px;right:3px;border-radius:6px;padding:5px 8px;font-size:11px;font-weight:500;cursor:grab;z-index:2;transition:opacity .15s,box-shadow .15s;user-select:none;overflow:hidden;}
.block:hover{box-shadow:0 2px 10px rgba(0,0,0,.12);}
.block:active{cursor:grabbing;opacity:.8;}
.block.dragging{opacity:.3;}
.block-title{font-weight:600;font-size:12px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.block-sub{font-size:10px;opacity:.65;margin-top:2px;}
.bacts{display:none;position:absolute;top:3px;right:3px;gap:2px;}
.block:hover .bacts{display:flex;}
.bact{width:14px;height:14px;border-radius:3px;border:none;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.1);color:inherit;font-weight:700;}
.bact:hover{background:rgba(0,0,0,.2);}
.add-btn{position:absolute;inset:0;background:none;border:none;cursor:pointer;opacity:0;font-size:18px;color:var(--g200);transition:opacity .15s;display:flex;align-items:center;justify-content:center;width:100%;}
.half-row:hover .add-btn{opacity:1;}
.legbar{display:flex;flex-wrap:wrap;gap:10px;padding:7px 18px;background:white;border-top:1px solid var(--g100);flex-shrink:0;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--g500);}
.ldot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}

/* ── CHECKLIST — lista simples sem toggle ── */
.cl-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.cl-card{background:white;border:1px solid var(--g100);border-radius:12px;overflow:hidden;}
.cl-card-hdr{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px 12px;
  border-bottom:2px solid var(--g50);
}
.cl-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cl-title{
  font-size:14px;font-weight:700;color:var(--g800);flex:1;
  cursor:text;
}
.cl-title:hover{color:var(--accent);}
.cl-hdr-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;}
.cl-card-hdr:hover .cl-hdr-actions{opacity:1;}
.cl-hdr-btn{font-size:10px;background:none;border:none;color:var(--g400);cursor:pointer;padding:2px 5px;border-radius:4px;font-family:inherit;}
.cl-hdr-btn:hover{background:var(--g50);color:var(--g700);}
.cl-hdr-btn.del:hover{background:#fee2e2;color:#dc2626;}
.cl-list{padding:4px 0;}
.cl-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 18px;
  border-bottom:1px solid var(--g50);
  transition:background .1s;
  position:relative;
}
.cl-item:last-child{border-bottom:none;}
.cl-item:hover{background:var(--g50);}
.cl-item-cb{
  width:15px;height:15px;border-radius:4px;
  border:1.5px solid var(--g200);flex-shrink:0;margin-top:2px;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.cl-item-cb.done{background:var(--accent);border-color:var(--accent);}
.cl-item-cb.done::after{content:'✓';font-size:9px;font-weight:700;color:white;}
.cl-item-text{font-size:13px;color:var(--g800);flex:1;line-height:1.45;cursor:text;}
.cl-item-text.done{text-decoration:line-through;color:var(--g300);}
.cl-item-note{font-size:11px;color:var(--g400);margin-top:2px;}
.cl-item-actions{display:none;gap:2px;flex-shrink:0;}
.cl-item:hover .cl-item-actions{display:flex;}
.cl-item-btn{font-size:10px;background:none;border:none;color:var(--g300);cursor:pointer;padding:1px 4px;border-radius:3px;font-family:inherit;}
.cl-item-btn:hover{background:var(--g100);color:var(--g700);}
.cl-item-btn.del:hover{background:#fee2e2;color:#dc2626;}
.cl-add-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 18px;cursor:pointer;
  font-size:12px;color:var(--g300);
  border-top:1px dashed var(--g100);
  transition:color .12s;
  background:none;border-left:none;border-right:none;border-bottom:none;
  width:100%;text-align:left;font-family:inherit;
}
.cl-add-item:hover{color:var(--accent);}
.cl-add-item-input{
  width:100%;border:none;outline:none;font-family:inherit;
  font-size:13px;color:var(--g800);padding:8px 18px;
  background:transparent;border-top:1px dashed var(--g100);
}
.cl-add-item-input::placeholder{color:var(--g300);}
.cl-new-cat-card{
  background:transparent;border:2px dashed var(--g150);
  border-radius:12px;overflow:hidden;transition:border-color .15s;
}
.cl-new-cat-card:hover{border-color:var(--accent);}
.cl-new-cat-input{
  width:100%;border:none;outline:none;font-family:inherit;
  font-size:14px;font-weight:600;color:var(--g800);padding:14px 18px;
  background:transparent;
}
.cl-new-cat-input::placeholder{color:var(--g300);font-weight:400;}
.cl-prog-bar{height:2px;background:var(--g100);}
.cl-prog-fill{height:2px;transition:width .35s;}

/* ── PROGRESS ── */
.prog-wrap{flex:1;overflow-y:auto;padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;}
.prog-card{background:white;border:1px solid var(--g100);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
.prog-card h3{font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;}
.ring-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ring-row:last-child{margin-bottom:0;}
.ring-label{font-size:11px;color:var(--g800);flex:1;}
.ring-bar{flex:2;height:5px;background:var(--g100);border-radius:99px;overflow:hidden;}
.ring-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.ring-pct{font-size:10px;color:var(--g500);width:28px;text-align:right;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-box{background:var(--g50);border-radius:10px;padding:14px 10px;text-align:center;}
.stat-num{font-family:'DM Serif Display',serif;font-size:24px;color:var(--g800);}
.stat-lbl{font-size:9px;color:var(--g500);margin-top:2px;}
.timeline{display:flex;flex-direction:column;}
.tl-row{display:flex;gap:10px;align-items:flex-start;padding:7px 0;}
.tl-time{font-size:9px;color:var(--g500);width:28px;flex-shrink:0;padding-top:3px;text-align:right;}
.tl-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--g100);border:2px solid var(--g300);margin-top:3px;flex-shrink:0;}
.tl-dot.done{background:var(--accent);border-color:var(--accent);}
.tl-conn{width:2px;background:var(--g100);flex:1;min-height:18px;}
.tl-title{font-size:11px;font-weight:500;color:var(--g800);}
.tl-sub{font-size:9px;color:var(--g500);margin-top:1px;}
.tl-chip{display:inline-block;font-size:8px;font-weight:600;padding:2px 6px;border-radius:20px;margin-top:3px;}

/* ── KANBAN ── */
.kanban-wrap{
  flex:1;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;gap:0;padding:8px 20px 20px;
  background:white;
  min-width:0;
}
.kanban-col{
  width:100%;min-width:0;
  background:white;
  display:flex;flex-direction:column;
  border:none;border-radius:0;
  border-bottom:1px solid var(--g100);
}
.kanban-col-hdr{
  display:flex;align-items:center;gap:6px;
  padding:10px 4px 8px;
  flex-shrink:0;
}
.kanban-col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.kanban-col-title{font-size:13px;font-weight:600;color:var(--g700);flex:1;text-transform:lowercase;cursor:pointer;}
.kanban-col-count{font-size:11px;color:var(--g400);background:var(--g150);padding:1px 7px;border-radius:20px;}
.kanban-col-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s;}
.kanban-col-hdr:hover .kanban-col-actions{opacity:1;}
.kanban-col-btn{background:none;border:none;cursor:pointer;color:var(--g400);font-size:13px;padding:2px 4px;border-radius:4px;font-family:inherit;}
.kanban-col-btn:hover{background:var(--g100);color:var(--g800);}
.kanban-col-btn.del:hover{color:#dc2626;}
.kanban-col-bar{display:none;}
.kanban-list{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px;}
.kanban-card{
  background:white;
  cursor:pointer;
  position:relative;
  border-bottom:none;
}
.kanban-card:hover{background:var(--g50);}
.kanban-card.expanded{cursor:default;}
.kanban-card-top{
  display:flex;align-items:center;gap:8px;
  padding:5px 4px;
}
.kanban-card-cb{
  width:15px;height:15px;border-radius:50%;
  border:1.5px solid var(--g300);flex-shrink:0;margin-top:1px;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.kanban-card-cb:hover{border-color:var(--accent);}
.kanban-card-cb.done{background:var(--accent);border-color:var(--accent);}
.kanban-card-cb.done::after{content:'✓';font-size:8px;font-weight:700;color:white;}
.kanban-card-body{flex:1;min-width:0;}
.kanban-card-title{
  font-size:12px;color:var(--g700);line-height:1.4;
  border:none;outline:none;background:none;font-family:inherit;
  width:100%;resize:none;cursor:pointer;
  padding:0;min-height:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.kanban-card.expanded .kanban-card-title{cursor:text;}
.kanban-card-title.done-txt{text-decoration:line-through;color:var(--g300);}
.kanban-card-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.kanban-card-due{font-size:11px;color:var(--g400);}
.kanban-card-due.overdue{color:#dc2626;}
.kanban-card-due.today{color:#cf6d9e;}
.kanban-card-sub{font-size:11px;color:var(--g400);}
/* Expandido */
.kanban-card-note{
  padding:0 12px 8px 35px;
  font-size:12px;color:var(--g600);
  border:none;outline:none;background:none;font-family:inherit;
  width:100%;resize:none;line-height:1.6;
  display:none;box-sizing:border-box;
}
.kanban-card.expanded .kanban-card-note{display:block;}
.kanban-card-subtasks{
  padding:0 12px 6px 35px;
  display:none;flex-direction:column;gap:3px;
}
.kanban-card.expanded .kanban-card-subtasks{display:flex;}
.kanban-sub-item{display:flex;align-items:center;gap:6px;}
.kanban-sub-cb{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--g300);flex-shrink:0;cursor:pointer;}
.kanban-sub-cb.done{background:var(--accent);border-color:var(--accent);}
.kanban-sub-label{font-size:12px;color:var(--g700);flex:1;border:none;background:none;outline:none;font-family:inherit;}
.kanban-sub-label.done-txt{text-decoration:line-through;color:var(--g300);}
.kanban-card-expand-btn{
  display:none;position:absolute;bottom:6px;right:8px;
  background:none;border:none;cursor:pointer;
  font-size:10px;color:var(--g300);font-family:inherit;padding:2px 4px;border-radius:4px;
}
.kanban-card:hover .kanban-card-expand-btn{display:block;}
.kanban-card-expand-btn:hover{background:var(--g50);color:var(--g700);}
.kanban-add{
  margin:2px 0 6px 20px;padding:3px 0;
  background:none;border:none;
  cursor:pointer;font-size:11px;color:var(--g300);
  font-family:inherit;text-align:left;
  transition:color .12s;
}
.kanban-add:hover{color:var(--accent);}
.kanban-add-col{
  background:none;border:none;
  cursor:pointer;display:inline-flex;align-items:center;padding:8px 4px;
  font-size:11px;color:var(--g300);gap:4px;transition:color .12s;
  margin-top:4px;
}
.kanban-add-col:hover{color:var(--accent);}

/* Barra de view toggle */
.kanban-view-bar{
  display:flex;align-items:center;gap:6px;
  padding:6px 20px 0;flex-shrink:0;
}
.kv-btn{
  font-size:12px;padding:4px 12px;border-radius:20px;
  border:1px solid var(--g150);background:none;cursor:pointer;
  font-family:inherit;color:var(--g500);transition:all .12s;
}
.kv-btn:hover{background:var(--g50);}
.kv-btn.active{background:var(--g150);color:var(--g800);border-color:var(--g200);}
.kv-sep{width:1px;height:18px;background:var(--g150);}

/* ── SOBREPOSIÇÃO DE BLOCOS NO CALENDÁRIO ── */
/* blocos lado a lado quando se sobrepõem */
.block-group{position:absolute;display:flex;gap:2px;}

/* ── NEXUS-WRAP usa cl-wrap grid ── */
.nexus-wrap{flex:1;overflow-y:auto;padding:0;display:flex;flex-direction:column;}

.nx-header{grid-column:span 2;background:var(--g100);border-radius:var(--radius);padding:22px 26px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);}
.nx-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--g800);letter-spacing:.01em;}
.nx-tag{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px;}
.nx-tagline{font-size:11px;color:rgba(255,255,255,.6);font-style:italic;text-align:right;}
.nx-week{background:white;border:1px solid var(--g100);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.nx-week-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;}
.nx-week-hdr:hover{background:var(--g50);}
.nx-week-num{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;}
.nx-week-info{flex:1;}
.nx-week-title{font-size:12px;font-weight:600;color:var(--g800);}
.nx-week-sub{font-size:10px;color:var(--g500);margin-top:1px;}
.nx-prog{font-size:10px;color:var(--g500);margin-right:3px;}
.nx-pbar{height:2px;background:var(--g100);}
.nx-pfill{height:2px;transition:width .35s;}
.nx-body{display:none;border-top:1px solid var(--g100);}
.nx-body.open{display:block;}
.nx-section{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);padding:9px 16px 3px;}
.nx-row{display:flex;align-items:flex-start;gap:9px;padding:6px 16px;border-bottom:1px solid var(--g50);cursor:pointer;transition:background .12s;}
.nx-row:hover{background:var(--g50);}
.nx-row:last-child{border-bottom:none;}
.nx-time{font-size:9px;color:var(--g300);white-space:nowrap;margin-top:2px;min-width:28px;}
.nx-alarm{font-size:9px;background:#FEF3C7;color:#92400E;border-radius:4px;padding:1px 5px;margin-top:3px;display:inline-block;}

/* ── DROP GHOST ── */
.drop-ghost{position:absolute;left:3px;right:3px;background:rgba(74,144,226,.1);border:1.5px dashed rgba(74,144,226,.4);border-radius:6px;pointer-events:none;z-index:5;}

/* ── RESIZE HANDLE ── */
.block-resize{
  position:absolute;bottom:0;left:0;right:0;height:10px;
  cursor:ns-resize;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;
}
.block-resize-top{
  position:absolute;top:0;left:0;right:0;height:10px;
  cursor:ns-resize;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;z-index:5;
}
.block:hover .block-resize,.block:hover .block-resize-top{opacity:1;}
.block .block-resize,.block .block-resize-top{pointer-events:all;}
.block-resize::after,.block-resize-top::after{content:'';width:24px;height:2px;background:currentColor;opacity:.4;border-radius:2px;}

/* ── BLOCOS SOBRE TRABALHO ── */
.work-overlay{
  position:absolute;left:3px;right:3px;
  border-radius:6px;padding:5px 8px;font-size:10px;font-weight:500;
  z-index:4;overflow:hidden;cursor:grab;user-select:none;
  box-shadow:0 1px 4px rgba(0,0,0,.12);
}
.work-overlay:active{cursor:grabbing;}

/* ── DRAG DE CARDS (Checklists / Nexus) ── */
.cl-wrap.drag-mode .cl-card{cursor:grab;}
.cl-card.card-dragging{opacity:.35;transform:scale(.98);}
.cl-card.card-over{outline:2px dashed var(--accent);outline-offset:2px;}
.cl-card-drag-handle{
  cursor:grab;padding:0 6px;color:var(--g300);font-size:12px;
  display:flex;align-items:center;flex-shrink:0;
}
.cl-card-drag-handle:hover{color:var(--g500);}
.nx-week.card-dragging{opacity:.35;}
.nx-week.card-over{outline:2px dashed var(--accent);outline-offset:2px;}

/* ── EDIÇÃO INLINE ── */
.editable{cursor:text;}
.editable:hover{background:rgba(0,0,0,.04);border-radius:3px;}
.editable-input{

<script>
const LS='rotina_v1_';
const SYNC_URL='https://script.google.com/macros/s/AKfycbxKOdmMJSibgdm3l999OTL33Ox9798xqPpGLfut0kGOojHJK4OeBsJ4PXExIlhnIRui/exec';
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
// Slots de 30min: índice 0 = 6h00, 1 = 6h30, 2 = 7h00 ... 35 = 23h30
const SLOT_START=6; // hora inicial
const TOTAL_SLOTS=36; // 6h00 a 23h30
function slotLabel(si){
  const h=SLOT_START+Math.floor(si/2);
  const m=si%2===0?'00':'30';
  return m==='00'?`${h}h`:``;// mostra label só nas horas cheias
}
function slotLabelFull(si){
  const h=SLOT_START+Math.floor(si/2);const m=si%2===0?'00':'30';
  return`${h}:${m}`;
}
// Converte slot antigo (índice hora) para novo (índice 30min)
// slot antigo 0 = 6h = novo slot 0; slot antigo 1 = 7h = novo slot 2; etc
function toHalfSlot(oldSlot){return oldSlot*2;}

let weekOffset=0,dragSrc=null,pickerTarget=null,currentPhase=1;
let calViewMode='semana';
let workVisible=false;
const calState={};
for(let d=0;d<7;d++) calState[d]={};

const weekStore={}; // weekOffset -> {0:{},1:{},...,6:{}}

function saveCurrentWeek(){
  const copy={};
  for(let d=0;d<7;d++){
    copy[d]={};
    Object.entries(calState[d]).forEach(([si,bd])=>{ if(bd) copy[d][si]=bd; });
  }
  weekStore[weekOffset]=copy;
}

function loadWeek(offset){
  for(let d=0;d<7;d++) calState[d]={};
  const saved=weekStore[offset];
  if(saved){
    for(let d=0;d<7;d++){
      Object.entries(saved[d]||{}).forEach(([si,bd])=>{ calState[d][parseInt(si)]=bd; });
    }
  }
}

function currentWeekTag(){
  const dates=getWeekDates();
  const d=dates[0];
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function clearTaskSlots(taskId){
  // Clear from current week
  for(let d=0;d<7;d++){
    Object.keys(calState[d]).forEach(si=>{
      const b=calState[d][si];
      if(b&&(b.taskId===taskId||String(b.taskId||'').startsWith(taskId+'_r')))
        calState[d][si]=null;
    });
  }
  // Clear from all stored weeks
  Object.keys(weekStore).forEach(wk=>{
    for(let d=0;d<7;d++){
      Object.keys(weekStore[wk][d]||{}).forEach(si=>{
        const b=weekStore[wk][d][si];
        if(b&&(b.taskId===taskId||String(b.taskId||'').startsWith(taskId+'_r')))
          weekStore[wk][d][si]=null;
      });
    }
  });
}

function clToggle(card,task){
  const key=card+'-'+task;
  clChecked[key]=!clChecked[key];
  const cb=document.getElementById('cb-'+card+'-'+task);
  const tx=document.getElementById('tx-'+card+'-'+task);
  const col=card==='yt'?'#7C6FCD':cardDefs[card]?.color||'#888';
  if(clChecked[key]){cb.classList.add('done');cb.style.background=col;tx.classList.add('done');}
  else{cb.classList.remove('done');cb.style.background='';tx.classList.remove('done');}
  updateAllProgress();
}

function clProgress(card){
  if(card==='yt'){const tasks=phaseData[currentPhase].tasks;return{done:tasks.filter(t=>clChecked['yt-'+t]).length,total:tasks.length};}
  const tasks=cardDefs[card].tasks;
  return{done:tasks.filter(t=>clChecked[card+'-'+t]).length,total:tasks.length};
}

function updateAllProgress(){
  ['gym','marmita','tommy','bibi','it'].forEach(c=>{
    const el=document.getElementById('prog-'+c);if(!el)return;
    const{done,total}=clProgress(c);el.textContent=done+'/'+total;
    const bar=document.getElementById('bar-'+c);if(bar)bar.style.width=Math.round(done/total*100)+'%';
  });
}

function clReset(card){
  const tasks=card==='yt'?phaseData[currentPhase].tasks:cardDefs[card].tasks;
  tasks.forEach(t=>{
    clChecked[card+'-'+t]=false;
    const cb=document.getElementById('cb-'+card+'-'+t);const tx=document.getElementById('tx-'+card+'-'+t);
    if(cb){cb.classList.remove('done');cb.style.background='';}if(tx)tx.classList.remove('done');
  });
  updateAllProgress();
}

function showPhase(n){
  for(let i=1;i<=5;i++){const el=document.getElementById('ph-'+i);if(el)el.style.display='none';}
  const el=document.getElementById('ph-'+n);if(el)el.style.display='block';
  const badge=document.getElementById('ph-badge');if(badge)badge.textContent=phaseLabels[n];
  currentPhase=n;updateAllProgress();
}

// ── DRAG DE TAREFAS ENTRE COLUNAS KANBAN ──
function initKanbanTaskDrag(kanban, tabId){
  let dragTaskId=null, dragCardId=null;

  function getTaskFromDefs(cardId, taskId){
    const defs=CARD_DEFS_BY_TAB[tabId]||[];
    const card=defs.find(c=>c.id===cardId);
    return card?card.tasks.find(t=>t.id===taskId):null;
  }

  function moveTask(fromCardId, taskId, toCardId){
    const defs=CARD_DEFS_BY_TAB[tabId]||[];
    const fromCard=defs.find(c=>c.id===fromCardId);
    const toCard=defs.find(c=>c.id===toCardId);
    if(!fromCard||!toCard) return;
    const idx=fromCard.tasks.findIndex(t=>t.id===taskId);
    if(idx<0) return;
    const [task]=fromCard.tasks.splice(idx,1);
    toCard.tasks.unshift(task);
    if(tabId==='nexus') renderNexus();
    else renderChecklist(tabId,'cl-wrap-'+tabId);
    saveState();
  }

  // Bind drag on each kanban-card
  function bindDrag(el){
    el.setAttribute('draggable','true');
    el.addEventListener('dragstart',e=>{
      e.stopPropagation();
      dragTaskId=el.dataset.tid;
      dragCardId=el.dataset.cid;
      setTimeout(()=>el.style.opacity='.35',0);
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain', dragTaskId);
    });
    el.addEventListener('dragend',()=>{
      el.style.opacity='';
      dragTaskId=null; dragCardId=null;
      kanban.querySelectorAll('.kanban-list.drag-over').forEach(l=>l.classList.remove('drag-over'));
    });
  }

  kanban.querySelectorAll('.kanban-card').forEach(bindDrag);

  // Each kanban-list accepts drops
  kanban.querySelectorAll('.kanban-list').forEach(list=>{
    list.addEventListener('dragover',e=>{
      if(!dragTaskId&&!draggingTask) return;
      e.preventDefault();
      e.stopPropagation();
      list.classList.add('drag-over');
    });
    list.addEventListener('dragleave',e=>{
      if(!list.contains(e.relatedTarget)) list.classList.remove('drag-over');
    });
    list.addEventListener('drop',e=>{
      e.preventDefault();
      e.stopPropagation();
      list.classList.remove('drag-over');
      const toCardId=list.id.replace('kl-','');
      if(draggingTask){
        // Task from task panel dropped onto kanban card
        const dt=draggingTask; draggingTask=null;
        const defs=CARD_DEFS_BY_TAB[tabId]||[];
        const toCard=defs.find(c=>c.id===toCardId);
        if(!toCard) return;
        // Remove from any existing card in this tab
        defs.forEach(card=>{card.tasks=card.tasks.filter(t=>t.id!==dt.id);});
        // Remove from other tabs too
        Object.keys(CARD_DEFS_BY_TAB).forEach(tid=>{
          if(tid===tabId) return;
          (CARD_DEFS_BY_TAB[tid]||[]).forEach(card=>{card.tasks=card.tasks.filter(t=>t.id!==dt.id);});
        });
        // Add to target card
        toCard.tasks.unshift({id:dt.id,l:dt.label||'',n:dt.note||'',due:dt.due||'',
          alarm:dt.alarm||'',time:dt.time||'',duration:dt.duration||''});
        // Update TASK_DATA catId
        ['semana','mes','nexus'].forEach(tab=>{
          const t=TASK_DATA[tab].find(x=>x.id===dt.id);
          if(t) t.catId=toCardId;
        });
        if(tabId==='nexus') renderNexus();
        else renderChecklist(tabId,'cl-wrap-'+tabId);
        if(currentFilterCat) filterTasksBy(currentFilterCat);
        else renderTaskPanelForKey(currentSidebarKey);
        saveState();
        return;
      }
      if(!dragTaskId) return;
      if(toCardId!==dragCardId) moveTask(dragCardId, dragTaskId, toCardId);
      dragTaskId=null; dragCardId=null;
    });
  });
}

function initCardDragPersistent(wrap, tabId){
  let dragId=null;
  wrap.querySelectorAll('[data-card-id]').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      dragId=card.dataset.cardId;
      setTimeout(()=>card.classList.add('card-dragging'),0);
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',dragId);
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('card-dragging');
      wrap.querySelectorAll('.card-over').forEach(c=>c.classList.remove('card-over'));
      dragId=null;
    });
    card.addEventListener('dragover',e=>{
      if(!dragId||card.dataset.cardId===dragId) return;
      e.preventDefault();
      wrap.querySelectorAll('.card-over').forEach(c=>c.classList.remove('card-over'));
      card.classList.add('card-over');
    });
    card.addEventListener('dragleave',e=>{
      if(!card.contains(e.relatedTarget)) card.classList.remove('card-over');
    });
    card.addEventListener('drop',e=>{
      e.preventDefault();
      card.classList.remove('card-over');
      if(!dragId||card.dataset.cardId===dragId) return;
      // Reordenar DOM
      const srcEl=wrap.querySelector(`[data-card-id="${dragId}"]`);
      const tgtEl=card;
      if(!srcEl||!tgtEl) return;
      const children=Array.from(wrap.children);
      const si=children.indexOf(srcEl), ti=children.indexOf(tgtEl);
      if(si<ti) wrap.insertBefore(srcEl,tgtEl.nextSibling);
      else wrap.insertBefore(srcEl,tgtEl);
      // Salvar nova ordem
      cardOrder[tabId]=Array.from(wrap.querySelectorAll('[data-card-id]')).map(el=>el.dataset.cardId);
    });
  });
}

function addTabTask(tabId, cardId){
  // No kanban, usar um prompt inline no topo da coluna
  const list=document.getElementById('kl-'+cardId);
  if(!list) {
    // Fallback: prompt
    const label=prompt('Nova tarefa:');
    if(label&&label.trim()){
      const defs=CARD_DEFS_BY_TAB[tabId];
      const card=defs?.find(c=>c.id===cardId);
      if(card){ card.tasks.push({id:cardId+'_t'+Date.now(),l:label.trim(),n:''}); }
      if(tabId==='nexus') renderNexus();
      else if(['historia','sociedade','noticias'].includes(tabId)) renderStudy();
      else renderChecklist(tabId,'cl-wrap-'+tabId);
    }
    return;
  }
  if(list.querySelector('.kanban-inline-add')) return;
  const wrap=document.createElement('div');
  wrap.className='kanban-inline-add';
  wrap.style.cssText='padding:4px 6px;margin-bottom:4px';
  wrap.innerHTML=`<input placeholder="Nova tarefa… (Enter)" style="width:100%;border:1.5px solid var(--accent);border-radius:7px;padding:6px 9px;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box">`;
  list.prepend(wrap);
  const inp=wrap.querySelector('input');
  inp.focus();
  function save(){
    const label=inp.value.trim();
    if(label){
      const defs=CARD_DEFS_BY_TAB[tabId];
      const card=defs?.find(c=>c.id===cardId);
      if(card){ card.tasks.unshift({id:cardId+'_t'+Date.now(),l:label,n:''}); }
    }
    wrap.remove();
    if(tabId==='nexus') renderNexus();
    else if(['historia','sociedade','noticias'].includes(tabId)) renderStudy();
    else renderChecklist(tabId,'cl-wrap-'+tabId);
    // Kanban tasks live in CARD_DEFS_BY_TAB - no TASK_DATA sync needed
    if(currentFilterCat) filterTasksBy(currentFilterCat);
    else renderTaskPanelForKey(currentSidebarKey);
    saveState();
  }
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();save();}
    if(e.key==='Escape'){wrap.remove();}
  });
  inp.addEventListener('blur',()=>setTimeout(()=>{if(document.contains(inp))save();},200));
}

function addTabCategory(tabId){
  const name=prompt('Nome da nova categoria (pode começar com emoji):');
  if(!name||!name.trim()) return;
  const raw=name.trim();
  const emojiMatch=raw.match(/^(\p{Emoji_Presentation}|\p{Extended_Pictographic})\s*/u);
  const icon=emojiMatch?emojiMatch[0].trim():'';
  const title=emojiMatch?raw.slice(emojiMatch[0].length).trim()||'nova categoria':raw.toLowerCase();
  const newId='cat_'+Date.now();
  if(!CARD_DEFS_BY_TAB[tabId]) CARD_DEFS_BY_TAB[tabId]=[];
  CARD_DEFS_BY_TAB[tabId].push({id:newId,icon,iconBg:'#f0f0f0',title,color:'var(--g500)',tasks:[]});
  if(!cardOrder[tabId]) cardOrder[tabId]=[];
  cardOrder[tabId].push(newId);
  if(tabId==='nexus') renderNexus();
  else renderChecklist(tabId,'cl-wrap-'+tabId);
  saveState();
}

function getWeekDates(){
  const now=new Date();const mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7)+weekOffset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function updateDateRange(){
  const dates=getWeekDates();const fmt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  document.getElementById('date-range').textContent=fmt(dates[0])+' — '+fmt(dates[6]);
}

function parseDurationToSlots(dur){
  if(!dur) return 2;
  dur=dur.trim();
  // Format HH:MM (primary format)
  const hhmm=dur.match(/^(\d{1,2}):(\d{2})$/);
  if(hhmm){
    const h=parseInt(hhmm[1]);
    const m=parseInt(hhmm[2]);
    const totalMin=h*60+m;
    return Math.max(1,Math.ceil(totalMin/30));
  }
  return 2; // fallback 1h
}

function renderCalDay(){
  const hdr=document.getElementById('cal-hdr');
  if(!hdr) return;
  const now=new Date();
  now.setDate(now.getDate()+weekOffset);
  const SLOT_H=28;
  const SLOTS=36; const SLOT_START=6;
  const dayIdx=(now.getDay()+6)%7;
  const dr2=document.getElementById('date-range');
  if(dr2) dr2.textContent=now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  hdr.style.gridTemplateColumns='52px 1fr';
  hdr.innerHTML=`<div class="cal-hcell"></div><div class="cal-hcell"><div class="day-name">${now.toLocaleDateString('pt-BR',{weekday:'short'}).toUpperCase()}</div><div class="day-num${now.toDateString()===new Date().toDateString()?' today':''}">${now.getDate()}</div></div>`;
  // Build day grid in a fresh container
  const dayWrap=document.createElement('div');
  dayWrap.style.cssText='display:grid;grid-template-columns:52px 1fr;flex:1;overflow-y:auto;';
  // Time col
  const timeCol=document.createElement('div');
  timeCol.style.cssText='display:flex;flex-direction:column;';
  for(let si=0;si<SLOTS;si++){
    const h=SLOT_START+Math.floor(si/2),m=si%2===0?'00':'30';
    const el=document.createElement('div');
    el.className='time-slot '+(si%2===0?'hour':'half');
    el.textContent=m==='00'?`${h}h`:'';
    el.style.height=SLOT_H+'px';
    timeCol.appendChild(el);
  }
  dayWrap.appendChild(timeCol);
  // Day col
  const cs=calState[dayIdx]||{};
  const col=document.createElement('div');
  col.className='day-col';col.style.cssText='border-left:1px solid var(--g100);position:relative;display:flex;flex-direction:column;';
  for(let si=0;si<SLOTS;si++){
    const row=document.createElement('div');
    row.className='half-row '+(si%2===0?'is-hour':'is-half');
    row.style.height=SLOT_H+'px';
    row.dataset.day=dayIdx;row.dataset.slot=si;
    const bd=cs[si];
    if(!bd){
      const ab=document.createElement('button');ab.className='add-btn';ab.textContent='+';
      ab.onclick=()=>openPicker(dayIdx,si,row);row.appendChild(ab);
    } else { row.classList.add('has-block'); }
    if(!bd||!bd.fixed){
      row.addEventListener('dragover',e=>{if(draggingTask||dragSrc){e.preventDefault();row.classList.add('drop-target');}});
      row.addEventListener('dragleave',()=>row.classList.remove('drop-target'));
      row.addEventListener('drop',e=>{e.preventDefault();row.classList.remove('drop-target');
        if(draggingTask){const t=draggingTask;const cat=getCat(t.catId);const label=t.label.length>26?t.label.slice(0,24)+'…':t.label;
          const slots=parseDurationToSlots(t.duration||'');
          for(let k=0;k<slots&&si+k<SLOTS;k++) calState[dayIdx][si+k]={bg:t._bg||cat.bg,color:t._color||cat.color,label,sub:cat.name||'',taskId:t.id};
          if(t.id) scheduledTasks.add(t.id);renderCal();draggingTask=null;return;}
        if(dragSrc){const{day:sd,slot:ss}=dragSrc;const srcLen=getBlockLen(sd,ss);
          const srcData=Array.from({length:srcLen},(_,i)=>calState[sd][ss+i]||null);
          for(let i=0;i<srcLen;i++) calState[sd][ss+i]=null;
          for(let i=0;i<srcLen;i++) if(si+i<SLOTS) calState[dayIdx][si+i]=srcData[i];
          dragSrc=null;renderCal();}
      });
    }
    col.appendChild(row);
  }
  // Render blocks
  const rendered=new Set();
  for(let si=0;si<SLOTS;si++){
    if(rendered.has(si)) continue;
    const bd=cs[si]; if(!bd) continue;
    let span=1;
    while(si+span<SLOTS&&cs[si+span]&&cs[si+span].label===bd.label) span++;
    for(let k=0;k<span;k++) rendered.add(si+k);
    const b=makeBlock(bd,dayIdx,si,span);
    b.style.top=(si*SLOT_H+2)+'px';b.style.height=(span*SLOT_H-4)+'px';
    col.appendChild(b);
  }
  dayWrap.appendChild(col);
  showCalAlt(dayWrap);
}

function renderCal(){
  if(calViewMode==='mes'){ renderCalMonth(); return; }
  if(calViewMode==='dia'){ renderCalDay(); return; }
  // Restore week layout
  hideCalAlt();
  const calHdr=document.getElementById('cal-hdr');
  if(calHdr){ calHdr.style.gridTemplateColumns='52px repeat(7,1fr)'; }
  updateDateRange();const dates=getWeekDates();const now=new Date();
  // Injetar ou remover blocos de trabalho seg-sex (slots 0–17 = 6h00–14h30)
  for(let d=0;d<5;d++){
    for(let s=0;s<18;s++) if(calState[d][s]&&calState[d][s].type==='work') calState[d][s]=null;
    if(workVisible){
      for(let s=0;s<18;s++) calState[d][s]={type:'work',label:'Trabalho',sub:'6h30–15h30',bg:'#F0F0F0',color:'#909090',fixed:true};
    }
  }
  // Slots visíveis
  let allSlots=Array.from({length:TOTAL_SLOTS},(_,i)=>i);
  const visibleSlots=allSlots;

  // Header
  const hdr=document.getElementById('cal-hdr');hdr.innerHTML='<div class="cal-hcell"></div>';
  dates.forEach((d,i)=>{const isToday=d.toDateString()===now.toDateString();
    hdr.innerHTML+=`<div class="cal-hcell"><div class="day-name">${DAYS[(i+1)%7]}</div><div class="day-num${isToday?' today':''}">${d.getDate()}</div></div>`;});

  // Time col
  const tc=document.getElementById('time-col');tc.innerHTML='';
  visibleSlots.forEach(si=>{
    const el=document.createElement('div');
    const isHour=si%2===0;
    el.className='time-slot '+(isHour?'hour':'half');
    el.textContent=isHour?slotLabel(si):'';
    tc.appendChild(el);
  });

  // Day cols — renderiza blocos expandidos
  const body=document.getElementById('cal-body');body.querySelectorAll('.day-col').forEach(e=>e.remove());
  const SLOT_H=28; // px por slot de 30min

  dates.forEach((_,di)=>{
    const col=document.createElement('div');col.className='day-col';
    col.style.position='relative';

    // Criar linhas de fundo (half-rows) para hover e drop
    visibleSlots.forEach((si,vi)=>{
      const row=document.createElement('div');

      } else {
        row.classList.add('has-block');
      }
      // All non-fixed rows accept drops (blocks AND tasks)
      if(!bd||!bd.fixed){
        row.addEventListener('dragover',e=>{
          if(draggingTask||dragSrc) {e.preventDefault();row.classList.add('drop-target');}
        });
        row.addEventListener('dragleave',()=>row.classList.remove('drop-target'));
        row.addEventListener('drop',e=>{e.preventDefault();row.classList.remove('drop-target');
          if(draggingTask){
            const t=draggingTask;
            const cat=getCat(t.catId);
            const bg=t._bg||cat.bg||'#d9ead3';
            const color=t._color||cat.color||'#45818e';
            const label=t.label.length>26?t.label.slice(0,24)+'…':t.label;
            const _slots2=parseDurationToSlots(draggingTask?.duration||'');
            const _tDragId2=draggingTask?.id||null;
            for(let _k=0;_k<_slots2&&si+_k<TOTAL_SLOTS;_k++) calState[di][si+_k]={bg,color,label,sub:cat.name||'',taskId:_tDragId2};
            if(t.id) scheduledTasks.add(t.id);
            renderCal();renderTaskPanelForKey(currentSidebarKey);draggingTask=null;return;
          }
          if(!dragSrc)return;
          const{day:sd,slot:ss}=dragSrc;const td=parseInt(row.dataset.day),ts=parseInt(row.dataset.slot);
          if(sd===td&&ss===ts)return;
          const srcLen=getBlockLen(sd,ss);
          const srcData=Array.from({length:srcLen},(_,i)=>calState[sd][ss+i]||null);
          // Clear source
          for(let i=0;i<srcLen;i++) calState[sd][ss+i]=null;
          // Clear destination (overwrite whatever was there)
          for(let i=0;i<srcLen;i++) if(td<7&&ts+i<TOTAL_SLOTS) calState[td][ts+i]=null;
          // Place block at destination
          for(let i=0;i<srcLen;i++) if(td<7&&ts+i<TOTAL_SLOTS) calState[td][ts+i]=srcData[i];
          dragSrc=null;
          renderCal();
        });
      } else if(bd&&bd.fixed){
        // Fixed (work) rows: task overlay drops handled via col-level (work block is pointer-events:none)
      }
      // Todos os slots aceitam drag de tarefa via listener no col (incluindo sobre trabalho)
      col.appendChild(row);
    });

    // Listener no col para capturar drag de tarefa sobre qualquer slot (inclusive blocos de trabalho)
    col.addEventListener('dragover',e=>{
      if(!draggingTask&&!dragSrc) return;
      e.preventDefault();
      e.dataTransfer.dropEffect=draggingTask?'copy':'move';
      col.querySelectorAll('.half-row').forEach(r=>r.classList.remove('drop-target'));
      const colRect=col.getBoundingClientRect();
      const relY=e.clientY-colRect.top;
      const slotIdx=Math.floor(relY/SLOT_H);
      const targetRow=col.querySelectorAll('.half-row')[slotIdx];
      if(targetRow) targetRow.classList.add('drop-target');
    });
    col.addEventListener('dragleave',e=>{
      if(!col.contains(e.relatedTarget))
        col.querySelectorAll('.half-row').forEach(r=>r.classList.remove('drop-target'));
    });
    col.addEventListener('drop',e=>{
      if(!draggingTask&&!dragSrc) return;
      e.preventDefault();
      col.querySelectorAll('.half-row').forEach(r=>r.classList.remove('drop-target'));
      removeGhost();
      const colRect=col.getBoundingClientRect();
      const relY=e.clientY-colRect.top;
      const viDropped=Math.max(0,Math.floor(relY/SLOT_H));
      const siDropped=visibleSlots[Math.min(viDropped,visibleSlots.length-1)];
      if(siDropped===undefined) return;

      if(dragSrc){
        if(dragSrc.isOverlay){
          // Moving an overlay block
          const{ov,overlayKey,overlayIdx}=dragSrc;
          removeOverlay(dragSrc.day,dragSrc.slot,overlayIdx);
          const dstFixed=calState[di][siDropped]?.fixed;
          if(dstFixed){
            addOverlay(di,siDropped,{...ov});
          } else {
            // Place as regular block
            const spans=ov.span||2;
            for(let k=0;k<spans&&siDropped+k<TOTAL_SLOTS;k++)
              calState[di][siDropped+k]={bg:ov.bg,color:ov.color,label:ov.label,sub:ov.sub||'',taskId:ov.taskId};
          }
          dragSrc=null;renderCal();return;
        }
        // Moving an existing calendar block
        const{day:sd,slot:ss}=dragSrc;
        if(sd===di&&ss===siDropped){dragSrc=null;return;}
        const srcLen=getBlockLen(sd,ss);
        const srcData=Array.from({length:srcLen},(_,i)=>calState[sd][ss+i]||null);
        // Clear source slots
        for(let i=0;i<srcLen;i++) calState[sd][ss+i]=null;
        const dstFixed=calState[di][siDropped]?.fixed;
        if(dstFixed){
          if(srcData[0]) addOverlay(di,siDropped,{
            label:srcData[0].label, sub:srcData[0].sub||'',
            bg:srcData[0].bg, color:srcData[0].color, span:srcLen,
            taskId:srcData[0].taskId
          });
        } else {
          for(let i=0;i<srcLen;i++) if(siDropped+i<TOTAL_SLOTS) calState[di][siDropped+i]=srcData[i];
        }
        dragSrc=null;
        renderCal();
        return;
      }

      const t=draggingTask;
      const cat=getCat(t.catId);
      const bg=t._bg||cat.bg;
      const color=t._color||cat.color;
      const label=t.label.length>26?t.label.slice(0,24)+'…':t.label;
      const bdAtSlot=calState[di][siDropped];
      if(bdAtSlot&&bdAtSlot.fixed){
        addOverlay(di,siDropped,{label,sub:cat.name||'',bg,color,span:2});
      } else {
        const _slots1=parseDurationToSlots(t.duration||'');
        for(let _k=0;_k<_slots1&&siDropped+_k<TOTAL_SLOTS;_k++) calState[di][siDropped+_k]={bg,color,label,sub:cat.name||'',taskId:t.id};
      }
      if(t.id) scheduledTasks.add(t.id);
      renderCal();
      renderTaskPanelForKey(currentSidebarKey);
      draggingTask=null;
    });

    // Renderizar blocos com suporte a sobreposição lado a lado
    const rendered=new Set();
    // Primeiro, agrupar blocos por slot de início e detectar sobreposições
    const blockGroups={}; // si → [{bd, si, span}]

    visibleSlots.forEach((si,vi)=>{
      if(rendered.has(si)) return;
      const bd=calState[di][si];
      if(!bd) return;
      let span=1;
      while(
        si+span<TOTAL_SLOTS &&
        visibleSlots.includes(si+span) &&
        calState[di][si+span] &&
        calState[di][si+span].bg===bd.bg &&
        calState[di][si+span].label===bd.label &&
        calState[di][si+span].type===bd.type
      ){ span++; }
      for(let k=0;k<span;k++) rendered.add(si+k);
      // Encontrar slot de início do grupo (agrupar blocos que se sobrepõem em tempo)
      let groupKey=si;
      // Verificar se há outro bloco que se inicia antes e cobre esse slot
      for(let prev=si-1;prev>=0;prev--){
        if(!blockGroups[prev]) continue;
        const prevEntry=blockGroups[prev];
        const overlaps=prevEntry.some(e=>e.si+e.span>si);
        if(overlaps){groupKey=prev;break;}
      }
      if(!blockGroups[groupKey]) blockGroups[groupKey]=[];
      blockGroups[groupKey].push({bd,si,span,vi});
    });

    // Renderizar grupos
    Object.entries(blockGroups).forEach(([gsi,entries])=>{
      const n=entries.length;
      entries.forEach((entry,colIdx)=>{
        const{bd,si,span,vi}=entry;
        const topPx=vi*SLOT_H+2;
        const heightPx=span*SLOT_H-4;
        const b=makeBlock(bd,di,si,span);
        // Dividir largura se houver sobreposição
        const w=n>1?`calc(${100/n}% - 3px)`:undefined;
        const left=n>1?`calc(${colIdx*(100/n)}% + ${colIdx>0?1:3}px)`:undefined;
        b.style.top=topPx+'px';
        b.style.height=heightPx+'px';
        if(w) b.style.width=w;
        if(left) b.style.left=left;
        if(n>1) b.style.right='auto';
        col.appendChild(b);
      });
    });

    // Renderizar overlays sobre trabalho
    renderOverlays(col,di,visibleSlots,SLOT_H);

    body.appendChild(col);
  });
  // Resize de colunas
  setTimeout(initColResize, 0);
}
function getBlockLen(di,si){
  const bd=calState[di][si];if(!bd)return 0;
  let len=1;
  while(si+len<TOTAL_SLOTS&&calState[di][si+len]&&calState[di][si+len].bg===bd.bg&&calState[di][si+len].label===bd.label) len++;
  return len;
}

// ── OVERLAYS (tarefas sobre trabalho) ──
const overlays={}; // {`d-si`: [{label,sub,bg,color,span},...]}
function addOverlay(di,si,data){
  const key=`${di}-${si}`;
  if(!overlays[key]) overlays[key]=[];
  overlays[key].push(data);
}
function removeOverlay(di,si,idx){
  const key=`${di}-${si}`;
  if(overlays[key]) overlays[key].splice(idx,1);
}
function renderOverlays(col,di,visibleSlots,SLOT_H){
  Object.keys(overlays).forEach(key=>{
    const[d,s]=key.split('-').map(Number);
    if(d!==di) return;
    const vi=visibleSlots.indexOf(s);if(vi<0) return;
    (overlays[key]||[]).forEach((ov,idx)=>{
      const el=document.createElement('div');
      el.className='work-overlay';
      el.style.cssText=`background:${ov.bg};color:${ov.color};top:${vi*SLOT_H+3}px;height:${(ov.span||2)*SLOT_H-6}px;left:3px;right:3px;position:absolute;cursor:grab;`;
      el.draggable=true;
      el.innerHTML=`<div class="block-title" style="user-select:none">${ov.label}</div>${ov.sub?`<div class="block-sub">${ov.sub}</div>`:''}`;
      // Delete
      const del=document.createElement('button');del.className='bact';del.innerHTML='&times;';
      del.style.cssText='position:absolute;top:3px;right:3px;';
      del.onclick=e=>{e.stopPropagation();removeOverlay(di,s,idx);renderCal();};
      el.appendChild(del);
      // Drag: treat like a regular block drag (store as dragSrc-like using a special marker)
      el.addEventListener('dragstart',e=>{
        e.stopPropagation();
        // Store overlay info so col-drop can place it correctly
        dragSrc={day:di,slot:s,isOverlay:true,overlayIdx:idx,overlayKey:key,ov};
        setTimeout(()=>el.style.opacity='.35',0);
        e.dataTransfer.effectAllowed='move';
      });
      el.addEventListener('dragend',()=>{el.style.opacity='';dragSrc=null;});
      // Dblclick: open task detail if taskId
      el.querySelector('.block-title').addEventListener('dblclick',e=>{
        e.stopPropagation();
        if(ov.taskId){openTaskDetail(ov.taskId);return;}
        startInlineEdit(el.querySelector('.block-title'),ov.label,v=>{ov.label=v;renderCal();});
      });
      col.appendChild(el);
    });
  });
}
function bindTaskDropOverlay(row,di,si){
  row.addEventListener('dragover',e=>{
    if(!draggingTask) return;
    e.preventDefault();
    e.dataTransfer.dropEffect='copy';
    row.classList.add('drop-target');
  });
  row.addEventListener('dragleave',e=>{
    if(!row.contains(e.relatedTarget)) row.classList.remove('drop-target');
  });
  row.addEventListener('drop',e=>{
    if(!draggingTask) return;
    e.preventDefault();
    row.classList.remove('drop-target');
    removeGhost();
    const t=draggingTask;
    const cat=getCat(t.catId);
    const label=t.label.length>26?t.label.slice(0,24)+'…':t.label;
    addOverlay(di,si,{label,sub:cat.name,bg:cat.bg,color:cat.color,span:2});
    // NÃO marcar como done — só ao dar check
    renderCal();
    draggingTask=null;
  });
}

// ── DRAG DE CARDS (Checklists e Nexus) ──
let cardDragSrc=null;
function initCardDrag(wrapId){
  const wrap=document.getElementById(wrapId);
  if(!wrap) return;
  wrap.querySelectorAll('[data-card-id]').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      cardDragSrc=card.dataset.cardId;
      card.classList.add('card-dragging');
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('card-dragging');
      wrap.querySelectorAll('.card-over').forEach(c=>c.classList.remove('card-over'));
      cardDragSrc=null;
    });
    card.addEventListener('dragover',e=>{
      if(!cardDragSrc||card.dataset.cardId===cardDragSrc) return;
      e.preventDefault();card.classList.add('card-over');
    });
    card.addEventListener('dragleave',()=>card.classList.remove('card-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();card.classList.remove('card-over');
      if(!cardDragSrc||card.dataset.cardId===cardDragSrc) return;
      const cards=Array.from(wrap.children);
      const srcEl=wrap.querySelector(`[data-card-id="${cardDragSrc}"]`);
      const tgtEl=card;
      const srcIdx=cards.indexOf(srcEl);const tgtIdx=cards.indexOf(tgtEl);
      if(srcIdx<tgtIdx) wrap.insertBefore(srcEl,tgtEl.nextSibling);
      else wrap.insertBefore(srcEl,tgtEl);
    });
  });
}
function makeBlock(bd,di,si,span=2){
  const b=document.createElement('div');b.className='block';
  b.style.cssText=`background:${bd.bg};color:${bd.color};`;
  if(bd.type==='work'){
    b.style.zIndex='1';
    b.innerHTML=`<div class="block-title" style="user-select:none">💼 trabalho</div><div class="block-sub">6h30 – 15h30</div>`;
    b.style.pointerEvents='auto';
    b.style.cursor='default';
    // Delete button
    const acts=document.createElement('div');acts.className='bacts';
    const del=document.createElement('button');del.className='bact';del.innerHTML='&times;';
    del.onclick=e=>{e.stopPropagation();
      for(let s=0;s<TOTAL_SLOTS;s++) if(calState[di][s]?.type==='work') calState[di][s]=null;
      renderCal();};
    acts.appendChild(del);b.appendChild(acts);
    // Make work block draggable
    b.draggable=true;
    b.addEventListener('dragstart',e=>{dragSrc={day:di,slot:si};setTimeout(()=>b.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    b.addEventListener('dragend',()=>{b.classList.remove('dragging');dragSrc=null;document.querySelectorAll('.drop-target').forEach(c=>c.classList.remove('drop-target'));});
    const rh=document.createElement('div');rh.className='block-resize';
    rh.style.zIndex='5';
    rh.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();startBlockResize(e,di,si,b);});
    b.appendChild(rh);
    const rht2=document.createElement('div');rht2.className='block-resize-top';
    rht2.style.zIndex='5';
    rht2.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();startBlockResizeTop(e,di,si,b);});
    b.appendChild(rht2);
    return b;
  }
  // Título editável inline
  const titleEl=document.createElement('div');
  titleEl.className='block-title editable';
  titleEl.textContent=bd.label;
  titleEl.title='Clique para abrir detalhe';
  titleEl.style.userSelect='none';
  // Click on block: open task detail if linked
  b.addEventListener('click',e=>{
    if(bd.taskId){ openTaskDetail(bd.taskId); }
  });
  b.addEventListener('click',e=>{ if(e.target.closest('.bact,.block-resize')) return; if(bd.taskId){ openTaskDetail(bd.taskId); } });
  titleEl.addEventListener('click',e=>{ e.stopPropagation(); if(bd.taskId){ openTaskDetail(bd.taskId); } });
  titleEl.addEventListener('dblclick',e=>{
    e.stopPropagation();
    startInlineEdit(titleEl, bd.label, val=>{
      const len=getBlockLen(di,si);
      for(let k=0;k<len;k++) if(calState[di][si+k]) calState[di][si+k].label=val;
      renderCal();
    });
  });
  b.appendChild(titleEl);
  if(bd.sub&&span>=2){
    const subEl=document.createElement('div');
    subEl.className='block-sub editable';
    subEl.textContent=bd.sub;
    subEl.title='Duplo clique para renomear';
    subEl.addEventListener('dblclick',e=>{
      e.stopPropagation();
      startInlineEdit(subEl, bd.sub, val=>{
        const len=getBlockLen(di,si);
        for(let k=0;k<len;k++) if(calState[di][si+k]) calState[di][si+k].sub=val;
        renderCal();
      });
    });
    b.appendChild(subEl);
  }
  if(!bd.fixed){
    // Botão deletar
    const acts=document.createElement('div');acts.className='bacts';
    const del=document.createElement('button');del.className='bact';del.innerHTML='&times;';
    del.onclick=e=>{e.stopPropagation();const len=getBlockLen(di,si);for(let k=0;k<len;k++) calState[di][si+k]=null;renderCal();};
    acts.appendChild(del);b.appendChild(acts);
    // Drag do bloco
    b.draggable=true;
    b.addEventListener('dragstart',e=>{dragSrc={day:di,slot:si};setTimeout(()=>b.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    b.addEventListener('dragend',()=>{b.classList.remove('dragging');dragSrc=null;document.querySelectorAll('.drop-target').forEach(c=>c.classList.remove('drop-target'));});
    // Resize handle (bottom - expand)
    const rh=document.createElement('div');rh.className='block-resize';
    rh.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();startBlockResize(e,di,si,b);});
    b.appendChild(rh);
    // Resize handle (top - shrink from top)
    const rht=document.createElement('div');rht.className='block-resize-top';
    rht.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();startBlockResizeTop(e,di,si,b);});
    b.appendChild(rht);
  }
  return b;
}

// ── RESIZE de blocos ──
let resizing=null;
function startBlockResize(e,di,si,blockEl){
  const startY=e.clientY;
  const origLen=getBlockLen(di,si);
  const SLOT_H=28;
  resizing={di,si,origLen};
  function onMove(ev){
    const dy=ev.clientY-startY;
    const delta=Math.round(dy/SLOT_H);
    const newLen=Math.max(1,origLen+delta);
    const bd=calState[di][si];
    if(!bd) return;
    // Limpar slots extras antigos
    for(let k=1;k<origLen+4;k++) if(calState[di][si+k]&&(calState[di][si+k].label===bd.label||calState[di][si+k].type===bd.type)) calState[di][si+k]=null;
    // Preencher novos
    for(let k=1;k<newLen&&si+k<TOTAL_SLOTS;k++) calState[di][si+k]={...bd,fixed:bd.fixed};
    renderCal();
  }
  function onUp(){
    resizing=null;
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

// ── RESIZE BLOCK FROM TOP (shrink/grow from top edge) ──
function startBlockResizeTop(e,di,si,blockEl){
  const startY=e.clientY;
  const origLen=getBlockLen(di,si);
  const origSi=si;
  const SLOT_H=28;
  const bd=calState[di][si];
  function onMove(ev){
    if(!bd) return;
    const dy=ev.clientY-startY;
    const slotsDelta=Math.round(dy/SLOT_H);
    // Moving top edge down = shrink from top
    const newSi=Math.max(0,Math.min(origSi+slotsDelta, origSi+origLen-1));
    const newLen=Math.max(1, origLen-slotsDelta);
    // Clear all original slots
    for(let k=0;k<origLen+2;k++) if(origSi+k<TOTAL_SLOTS&&calState[di][origSi+k]?.label===bd.label) calState[di][origSi+k]=null;
    // Fill from new start
    for(let k=0;k<newLen&&newSi+k<TOTAL_SLOTS;k++) calState[di][newSi+k]={...bd,fixed:bd.fixed};
    renderCal();
  }
  function onUp(){
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

// ── EDIÇÃO INLINE ──
function startInlineEdit(el, currentVal, onSave){
  const input=document.createElement('input');
  input.className='editable-input';
  input.value=currentVal;
  input.style.width=Math.max(60,el.offsetWidth)+'px';
  el.replaceWith(input);
  input.focus();input.select();
  function save(){const v=input.value.trim()||currentVal;input.replaceWith(el);el.textContent=v;onSave(v);}
  input.addEventListener('blur',save);
  input.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();save();}if(ev.key==='Escape'){input.replaceWith(el);}});
}
function dupBlock(di,si){
  const bd=calState[di][si];const len=getBlockLen(di,si);
  for(let s=si+len;s<TOTAL_SLOTS-len+1;s++){
    if(!calState[di][s]){for(let k=0;k<len;k++) calState[di][s+k]={...bd};renderCal();return;}
  }
}
function openPicker(di,si,el){
  // Create a new blank task and open its detail panel
  const h=Math.floor(6+si/2);const m=si%2===0?'00':'30';
  const timeStr=h+':'+m;
  const task={id:'u'+Date.now(),label:'',catId:CATEGORIES[0]?.id||'nexus',
    done:false,priority:3,due:'',note:'',alarm:'',time:timeStr,duration:'01:00'};
  TASK_DATA.semana.unshift(task);
  // Pre-fill calendar slot when saved
  task._pendingSlot={di,si};
  openTaskDetail(task.id);
  saveState();
}
function closePicker(){document.getElementById('picker').classList.remove('open');pickerTarget=null;}
function pick(type,label,sub,bg,color){if(!pickerTarget)return;const{di,si}=pickerTarget;calState[di][si]={type,label,sub,bg,color};closePicker();renderCal();}
document.addEventListener('click',e=>{if(!e.target.closest('#picker')&&!e.target.closest('.add-btn'))closePicker();});

// NEXUS
const nxChecked={};
const nxWeeks={
  1:{color:'#6B62B5',tasks:['n1t1','n1t2','n1t3','n1t4','n1t5']},
  2:{color:'#4A9E89',tasks:['n2t1','n2t2','n2t3','n2t4','n2t5']},
  3:{color:'#B07070',tasks:['n3t1','n3t2','n3t3','n3t4','n3t5']},
  4:{color:'#A08040',tasks:['n4t1','n4t2','n4t3','n4t4','n4t5']},
};
function nxRow(week,task,label,note,time,alarm){
  return`<div class="nx-row" onclick="nxToggle(${week},'${task}')">
    <div class="cb" id="nxcb-${week}-${task}"></div>
    <div style="flex:1">
      <div class="cl-text" id="nxtx-${week}-${task}">${label}</div>

function nxToggle(week,task){
  const key=week+'-'+task;nxChecked[key]=!nxChecked[key];
  const cb=document.getElementById('nxcb-'+week+'-'+task);
  const tx=document.getElementById('nxtx-'+week+'-'+task);
  const col=nxWeeks[week].color;
  if(nxChecked[key]){cb.classList.add('done');cb.style.background=col;tx.classList.add('done');}
  else{cb.classList.remove('done');cb.style.background='';tx.classList.remove('done');}
  nxUpdateProgress();
}
function nxProgress(week){
  const tasks=nxWeeks[week].tasks;
  return{done:tasks.filter(t=>nxChecked[week+'-'+t]).length,total:tasks.length};
}
function nxUpdateProgress(){
  [1,2,3,4].forEach(w=>{
    const{done,total}=nxProgress(w);
    const p=document.getElementById('nxprog-'+w);if(p)p.textContent=done+'/'+total;
    const b=document.getElementById('nxbar-'+w);if(b)b.style.width=Math.round(done/total*100)+'%';
  });
}
function nxToggleWeek(w){
  const body=document.getElementById('nxbody-'+w);const chev=document.getElementById('nxchev-'+w);
  if(!body)return;const open=body.classList.contains('open');
  body.classList.toggle('open',!open);chev.classList.toggle('open',!open);
}
